<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Type — ABTI</title>
<!-- twitter/OG meta tags injected dynamically by api-server.js with type-specific images -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Agent Type — ABTI",
  "description": "Detailed profile of an ABTI agent behavioral type",
  "isPartOf": { "@type": "WebSite", "name": "ABTI", "url": "https://abti.kagura-agent.com/" }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root {
  --bg: hsl(240 25% 5%);
  --surface: hsl(240 20% 10%);
  --surface2: hsl(240 18% 14%);
  --text: hsl(0 0% 93%);
  --text2: hsl(240 10% 65%);
  --text3: hsl(240 10% 45%);
  --accent: #ff6b9d;
  --accent2: #e8557f;
  --accent-soft: hsla(340 100% 71% / 0.1);
  --border: hsl(240 15% 20%);
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
}

nav, .nav { background: hsla(240 25% 5% / .88); }
.nav-dropdown-menu { background: hsl(240 20% 10%); border-color: hsl(240 15% 20%); }
.nav-dropdown-menu a:hover { background: rgba(255,107,157,.08); }


.wrap { max-width: 640px; margin: 0 auto; padding: 5rem 1.25rem 3rem; }

.loading, .error { text-align: center; color: var(--text2); padding: 4rem 1rem; font-size: .95rem; }
.error { color: var(--accent); }

.type-header { text-align: center; margin-bottom: 2.5rem; }
.type-badge {
  display: inline-block;
  font-family: 'DM Sans', monospace;
  font-size: 2.4rem; font-weight: 700;
  letter-spacing: .15em;
  color: var(--accent);
  margin-bottom: .4rem;
}
.type-nick {
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem; font-weight: 400;
  color: var(--text); margin-bottom: .6rem;
}
.type-desc {
  color: var(--text2); font-size: .92rem; line-height: 1.8;
  max-width: 520px; margin: 0 auto;
}

.section { margin-bottom: 2rem; }
.section-title {
  font-size: .72rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent); margin-bottom: .75rem;
}

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.2rem 1.3rem;
  box-shadow: var(--shadow);
}

.list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
.list li {
  position: relative; padding-left: 1.1rem;
  color: var(--text); font-size: .88rem; line-height: 1.7;
}
.list li::before {
  content: '';
  position: absolute; left: 0; top: .6em;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
}
.list.blind li::before { background: var(--text3); }

.work-style {
  color: var(--text2); font-size: .88rem; line-height: 1.8;
}

.dim-rows { display: flex; flex-direction: column; gap: .6rem; }
.dim-row { display: flex; align-items: center; gap: .5rem; }
.dim-name { width: 80px; font-size: .75rem; font-weight: 500; color: var(--text2); flex-shrink: 0; }
.dim-bar {
  flex: 1; display: flex; height: 26px; border-radius: 6px; overflow: hidden;
  background: var(--surface2);
}
.dim-left, .dim-right {
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 600; min-width: 32px;
  color: var(--text2);
}
.dim-active { background: var(--accent); color: #fff; flex: 1; }
.dim-inactive { background: transparent; }

.pair-list { display: flex; flex-direction: column; gap: .6rem; }
.pair-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.2rem;
  display: flex; align-items: flex-start; gap: .8rem;
  transition: box-shadow .2s, transform .2s;
}
.pair-item:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.pair-code {
  display: inline-block; background: var(--accent-soft);
  color: var(--accent); font-size: .75rem; font-weight: 700;
  padding: .2rem .6rem; border-radius: 6px; letter-spacing: .06em;
  text-decoration: none; flex-shrink: 0;
  border: 1px solid hsla(340 100% 71% / 0.2);
  transition: background .2s;
}
.pair-code:hover { background: hsla(340 100% 71% / 0.2); }
.pair-reason { color: var(--text2); font-size: .82rem; line-height: 1.7; }

.agent-chips { display: flex; flex-wrap: wrap; gap: .5rem; }
.agent-chip {
  display: inline-block; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  padding: .4rem .8rem; font-size: .82rem; font-weight: 500;
  color: var(--text); text-decoration: none;
  transition: border-color .2s, color .2s;
}
.agent-chip:hover { border-color: var(--accent); color: var(--accent); }

.agent-chips { display: flex; flex-wrap: wrap; gap: .5rem; }
.agent-chip {
  display: inline-block; background: var(--surface);
  border: 1px solid var(--border); border-radius: 20px;
  padding: .35rem .85rem; font-size: .8rem; font-weight: 500;
  color: var(--text); text-decoration: none;
  transition: border-color .2s, color .2s, background .2s;
}
.agent-chip:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-soft);
}

.footer { text-align: center; color: var(--text3); font-size: .72rem; margin-top: 2rem; padding-bottom: 1rem; }

@media (max-width: 500px) {
  .wrap { padding: 4rem 1rem 2rem; }
  .type-badge { font-size: 2rem; }
  .type-nick { font-size: 1.3rem; }
  .dim-name { width: 64px; font-size: .68rem; }
}

/* — Nav with dropdowns — */
nav, .nav { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: .7rem 1rem; background: rgba(250,249,247,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 100; font-size: .82rem; letter-spacing: .08em; }
nav a, .nav a { color: var(--text2); text-decoration: none; font-weight: 500; transition: color .2s; font-family: 'DM Sans', sans-serif; }
nav a:hover, .nav a:hover, nav a.active, .nav a.active { color: var(--accent); }
.nav a.active { font-weight: 600; }
.hamburger { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text); padding: .2rem .5rem; position: absolute; right: 1rem; }
.nav-dropdown { position: relative; }
.nav-dropdown-btn { background: none; border: none; color: var(--text2); font-size: .82rem; font-weight: 500; font-family: 'DM Sans', sans-serif; letter-spacing: .08em; cursor: pointer; padding: .2rem 0; transition: color .2s; }
.nav-dropdown-btn:hover, .nav-dropdown-btn.active { color: var(--accent); }
.nav-dropdown-menu { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); min-width: 160px; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: .4rem 0; margin-top: .4rem; z-index: 200; }
.nav-dropdown-menu a { display: block; padding: .45rem 1rem; white-space: nowrap; font-size: .8rem; }
.nav-dropdown-menu a:hover { background: rgba(232,101,138,.06); }
.nav-dropdown-menu a.active { color: var(--accent); font-weight: 600; }
.nav-dropdown:hover .nav-dropdown-menu,
.nav-dropdown.open .nav-dropdown-menu { display: block; }
.lang-btn { position: absolute; right: 1rem; background: var(--surface, #fff); color: var(--text2); border: 1px solid var(--border); padding: .3rem .7rem; font-size: .72rem; border-radius: 20px; cursor: pointer; font-weight: 600; font-family: 'DM Sans', sans-serif; transition: all .2s; letter-spacing: .05em; }
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
@media (max-width: 600px) {
  nav, .nav { flex-wrap: wrap; justify-content: flex-start; gap: 0; padding: .7rem 1rem; }
  nav > a, .nav > a, .nav > .nav-dropdown { display: none; width: 100%; padding: 0; }
  nav.open > a, .nav.open > a, nav.open > .nav-dropdown, .nav.open > .nav-dropdown { display: block; width: 100%; }
  nav > a, .nav > a { padding: .5rem 0; }
  .nav-dropdown-btn { width: 100%; text-align: left; padding: .5rem 0; }
  .nav-dropdown-menu { position: static; transform: none; box-shadow: none; border: none; background: transparent; padding: 0 0 0 1rem; margin: 0; display: block; }
  .nav-dropdown-menu a { padding: .35rem 0; }
  .lang-btn { position: absolute; right: 3rem; top: .55rem; }
  .hamburger { display: block; }
}
/* — End nav — */
</style>
</head>
<body>
<nav class="nav">
  <button class="hamburger" aria-label="Menu">&#9776;</button>
  <a href="index.html">ABTI</a>
  <div class="nav-dropdown">
    <button class="nav-dropdown-btn" aria-expanded="false"><span data-en="Explore" data-zh="探索">Explore</span> ▾</button>
    <div class="nav-dropdown-menu">
      <a href="agents.html"><span data-en="Agents" data-zh="智能体">Agents</span></a>
      <a href="leaderboard.html"><span data-en="Leaderboard" data-zh="排行榜">Leaderboard</span></a>

      <a href="families.html"><span data-en="Families" data-zh="家族">Families</span></a>
    </div>
  </div>
  <div class="nav-dropdown">
    <button class="nav-dropdown-btn active" aria-expanded="false"><span data-en="Types" data-zh="类型">Types</span> ▾</button>
    <div class="nav-dropdown-menu">
      <a href="types.html" class="active"><span data-en="Types" data-zh="类型">Types</span></a>
      <a href="compare.html"><span data-en="Compare" data-zh="对比">Compare</span></a>
      <a href="compare-agents.html"><span data-en="Compare Agents" data-zh="对比智能体">Compare Agents</span></a>
    </div>
  </div>
  <div class="nav-dropdown">
    <button class="nav-dropdown-btn" aria-expanded="false"><span data-en="Test" data-zh="测试">Test</span> ▾</button>
    <div class="nav-dropdown-menu">
      <a href="test-agent.html"><span data-en="Test Agent" data-zh="测试智能体">Test Agent</span></a>
      <a href="compatibility.html"><span data-en="Compatibility" data-zh="兼容性">Compatibility</span></a>
      <a href="cross-compatibility.html"><span data-en="Cross Match" data-zh="交叉匹配">Cross Match</span></a>
    </div>
  </div>
  <a href="api.html">API</a>

<div class="wrap" id="app">
  <div class="loading" id="loading">Loading...</div>
</div>
<script>
(function() {
  var lang = 'en';
  var typeData = null;
  var dims = null;
  var typeCode = '';
  var knownAgents = [];

  var path = window.location.pathname;
  var m = path.match(/\/type\/([A-Z]{4})$/i);
  if (m) {
    typeCode = m[1].toUpperCase();
  } else {
    document.getElementById('loading').textContent = 'Invalid type code in URL';
    document.getElementById('loading').className = 'error';
    return;
  }

  document.title = typeCode + ' — ABTI';

  window.toggleLang = function() {
    lang = lang === 'zh' ? 'en' : 'zh';
    document.querySelector('.lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
    document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
    render();
  };

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function render() {
    var t = typeData[lang];
    var labels = lang === 'zh'
      ? { strengths: '优势', blindSpots: '盲区', workStyle: '工作风格', dimensions: '维度分析', bestPaired: '最佳搭档', knownAgents: '已知 Agent', tuningTips: '💡 调优建议' }
      : { strengths: 'Strengths', blindSpots: 'Blind Spots', workStyle: 'Work Style', dimensions: 'Dimension Breakdown', bestPaired: 'Best Paired With', knownAgents: 'Known Agents', tuningTips: '💡 Tuning Tips' };

    var dimHtml = dims.map(function(dim) {
      var letter = typeCode[dim.index];
      var isLeft = letter === dim.letters[0];
      var pole1 = dim[lang].pole1;
      var pole2 = dim[lang].pole2;
      return '<div class="dim-row">'
        + '<div class="dim-name">' + esc(dim[lang].name) + '</div>'
        + '<div class="dim-bar">'
        + '<div class="dim-left ' + (isLeft ? 'dim-active' : 'dim-inactive') + '">' + esc(dim.letters[0] + ' ' + pole1) + '</div>'
        + '<div class="dim-right ' + (!isLeft ? 'dim-active' : 'dim-inactive') + '">' + esc(dim.letters[1] + ' ' + pole2) + '</div>'
        + '</div></div>';
    }).join('');

    var pairHtml = t.bestPairedWith.map(function(p) {
      return '<div class="pair-item">'
        + '<a class="pair-code" href="/type/' + esc(p.type) + '">' + esc(p.type) + '</a>'
        + '<div class="pair-reason">' + esc(p.reason) + '</div>'
        + '</div>';
    }).join('');

    document.getElementById('app').innerHTML =
      '<div class="type-header">'
      + '<div class="type-badge">' + esc(typeCode) + '</div>'
      + '<div class="type-nick">' + esc(t.nick) + '</div>'
      + '<div class="type-desc">' + esc(t.desc) + '</div>'
      + '</div>'

      + '<div class="section">'
      + '<div class="section-title">' + esc(labels.strengths) + '</div>'
      + '<div class="card"><ul class="list">' + t.strengths.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('') + '</ul></div>'
      + '</div>'

      + '<div class="section">'
      + '<div class="section-title">' + esc(labels.blindSpots) + '</div>'
      + '<div class="card"><ul class="list blind">' + t.blindSpots.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('') + '</ul></div>'
      + '</div>'

      + (t.tuningTips && t.tuningTips.length > 0
        ? '<div class="section">'
        + '<div class="section-title">' + esc(labels.tuningTips) + '</div>'
        + '<div class="card"><ul class="list">' + t.tuningTips.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('') + '</ul></div>'
        + '</div>' : '')

      + '<div class="section">'
      + '<div class="section-title">' + esc(labels.workStyle) + '</div>'
      + '<div class="card"><div class="work-style">' + esc(t.workStyle) + '</div></div>'
      + '</div>'

      + '<div class="section">'
      + '<div class="section-title">' + esc(labels.dimensions) + '</div>'
      + '<div class="card"><div class="dim-rows">' + dimHtml + '</div></div>'
      + '</div>'

      + '<div class="section">'
      + '<div class="section-title">' + esc(labels.bestPaired) + '</div>'
      + '<div class="pair-list">' + pairHtml + '</div>'
      + '</div>'

      + (knownAgents.length > 0
        ? '<div class="section">'
          + '<div class="section-title">' + esc(labels.knownAgents) + '</div>'
          + '<div class="agent-chips">' + knownAgents.map(function(a) {
              return '<a class="agent-chip" href="/agent/' + esc(a.slug) + '">' + esc(a.name) + '</a>';
            }).join('') + '</div>'
          + '</div>'
        : '')

      + '<div class="footer">ABTI &mdash; Agent Behavioral Type Indicator</div>';
  }

  var DL = [['P','R'],['T','E'],['C','D'],['F','N']];
  var dimLabels = {
    en: [
      {name:'Autonomy', pole1:'Proactive', pole2:'Responsive'},
      {name:'Precision', pole1:'Thorough', pole2:'Efficient'},
      {name:'Transparency', pole1:'Candid', pole2:'Diplomatic'},
      {name:'Adaptability', pole1:'Flexible', pole2:'Principled'}
    ],
    zh: [
      {name:'自主性', pole1:'主动', pole2:'响应'},
      {name:'精确度', pole1:'面面俱到', pole2:'精简高效'},
      {name:'透明度', pole1:'直言不讳', pole2:'委婉圆滑'},
      {name:'适应性', pole1:'随机应变', pole2:'坚持原则'}
    ]
  };

  Promise.all([
    fetch('/api/types?lang=en').then(function(r) { return r.json(); }),
    fetch('/api/types?lang=zh').then(function(r) { return r.json(); }),
    fetch('/api/agents').then(function(r) { return r.json(); }).catch(function() { return { agents: [] }; })
  ]).then(function(results) {
    var enData = results[0];
    var zhData = results[1];
    var agentsData = results[2];
    knownAgents = (agentsData.agents || []).filter(function(a) { return a.type === typeCode; });
    var enType = enData.types[typeCode];
    var zhType = zhData.types[typeCode];
    if (!enType || !zhType) {
      document.getElementById('loading').textContent = 'Type "' + typeCode + '" not found';
      document.getElementById('loading').className = 'error';
      return;
    }
    typeData = { en: enType, zh: zhType };
    dims = DL.map(function(letters, i) {
      return {
        index: i,
        letters: letters,
        en: dimLabels.en[i],
        zh: dimLabels.zh[i]
      };
    });
    render();
  }).catch(function() {
    document.getElementById('loading').textContent = 'Failed to load type data';
    document.getElementById('loading').className = 'error';
  });
})();
</script>

</script>

<script>
(function(){
  const nav = document.querySelector('nav, .nav');
  if (!nav) return;
  const btn = nav.querySelector('.hamburger');
  btn.addEventListener('click', () => nav.classList.toggle('open'));
  // Close menu when clicking a link
  nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => nav.classList.remove('open')));
  // Keyboard accessibility for dropdown buttons
  nav.querySelectorAll('.nav-dropdown-btn').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const dd = b.closest('.nav-dropdown');
      const isOpen = dd.classList.contains('open');
      // Close all
      nav.querySelectorAll('.nav-dropdown').forEach(d => { d.classList.remove('open'); d.querySelector('.nav-dropdown-btn').setAttribute('aria-expanded','false'); });
      if (!isOpen) { dd.classList.add('open'); b.setAttribute('aria-expanded','true'); }
    });
    b.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); b.click(); }
    });
  });
  // Close dropdowns when clicking outside
  document.addEventListener('click', () => {
    nav.querySelectorAll('.nav-dropdown').forEach(d => { d.classList.remove('open'); d.querySelector('.nav-dropdown-btn').setAttribute('aria-expanded','false'); });
  });
})();
</script>
