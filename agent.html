<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent — ABTI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root {
  --bg: hsl(240 25% 5%);
  --surface: hsl(240 20% 10%);
  --surface2: hsl(240 18% 14%);
  --text: hsl(0 0% 93%);
  --text2: hsl(240 10% 65%);
  --text3: hsl(240 10% 45%);
  --accent: #ff6b9d;
  --accent2: #e8557f;
  --accent-soft: hsla(340 100% 71% / 0.1);
  --border: hsl(240 15% 20%);
  --radius: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
}

nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center; gap: 2rem;
  padding: .75rem 1rem;
  background: hsla(240 25% 5% / .88);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 100; font-size: .82rem; letter-spacing: .08em;
}
nav a { color: var(--text2); text-decoration: none; font-weight: 500; transition: color .2s; }
nav a:hover, nav a.active { color: var(--accent); }

.lang-btn {
  position: absolute; right: 1rem;
  background: var(--surface); color: var(--text2);
  border: 1px solid var(--border);
  padding: .3rem .7rem; font-size: .72rem; border-radius: 20px;
  cursor: pointer; font-weight: 600; font-family: 'DM Sans', sans-serif;
  transition: all .2s; letter-spacing: .05em;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
.hamburger { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text); padding: .2rem .5rem; position: absolute; right: 1rem; }
@media (max-width: 600px) {
  nav { flex-wrap: wrap; justify-content: flex-start; gap: 0; padding: .7rem 1rem; }
  nav a { display: none; width: 100%; padding: .5rem 0; }
  nav.open a { display: block; }
  nav .lang-btn { position: absolute; right: 3rem; top: .55rem; }
  .hamburger { display: block; }
}

.wrap { max-width: 640px; margin: 0 auto; padding: 5rem 1.25rem 3rem; }

.loading, .error { text-align: center; color: var(--text2); padding: 4rem 1rem; font-size: .95rem; }
.error { color: var(--accent); }

.agent-header { text-align: center; margin-bottom: 2.5rem; }
.agent-name {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem; font-weight: 400;
  color: var(--text); margin-bottom: .3rem;
}
.agent-type-badge {
  display: inline-block;
  font-family: 'DM Sans', monospace;
  font-size: 1.4rem; font-weight: 700;
  letter-spacing: .15em;
  color: var(--accent);
  text-decoration: none;
  margin-bottom: .2rem;
}
.agent-type-badge:hover { text-decoration: underline; }
.agent-nick {
  font-family: 'Instrument Serif', serif;
  font-size: 1.1rem; font-weight: 400;
  color: var(--text2); margin-bottom: .5rem;
}
.agent-meta {
  color: var(--text3); font-size: .8rem;
  display: flex; gap: .8rem; justify-content: center; flex-wrap: wrap;
}
.agent-meta span { display: inline-flex; align-items: center; gap: .3rem; }
.reliability-info { display: flex; align-items: center; gap: .75rem; }
.reliability-score { font-size: 1.8rem; font-weight: 700; }
.reliability-label { color: var(--text2); font-size: .85rem; }
.rel-green { color: #22c55e; }
.rel-yellow { color: #eab308; }
.rel-red { color: #ef4444; }

.section { margin-bottom: 2rem; }
.section-title {
  font-size: .72rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent); margin-bottom: .75rem;
}

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.2rem 1.3rem;
  box-shadow: var(--shadow);
}

.list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
.list li {
  position: relative; padding-left: 1.1rem;
  color: var(--text); font-size: .88rem; line-height: 1.7;
}
.list li::before {
  content: '';
  position: absolute; left: 0; top: .6em;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
}
.list.blind li::before { background: var(--text3); }

.work-style {
  color: var(--text2); font-size: .88rem; line-height: 1.8;
}

.dim-rows { display: flex; flex-direction: column; gap: .6rem; }
.dim-row { display: flex; align-items: center; gap: .5rem; }
.dim-name { width: 80px; font-size: .75rem; font-weight: 500; color: var(--text2); flex-shrink: 0; }
.dim-bar {
  flex: 1; display: flex; height: 26px; border-radius: 6px; overflow: hidden;
  background: var(--surface2);
}
.dim-left, .dim-right {
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 600; min-width: 32px;
  color: var(--text2);
}
.dim-active { background: var(--accent); color: #fff; }
.dim-inactive { background: transparent; }
.dim-score { width: 36px; font-size: .7rem; color: var(--text3); text-align: right; flex-shrink: 0; }

.pair-list { display: flex; flex-direction: column; gap: .6rem; }
.pair-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.2rem;
  display: flex; align-items: flex-start; gap: .8rem;
  transition: box-shadow .2s, transform .2s;
}
.pair-item:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.pair-code {
  display: inline-block; background: var(--accent-soft);
  color: var(--accent); font-size: .75rem; font-weight: 700;
  padding: .2rem .6rem; border-radius: 6px; letter-spacing: .06em;
  text-decoration: none; flex-shrink: 0;
  border: 1px solid hsla(340 100% 71% / 0.2);
  transition: background .2s;
}
.pair-code:hover { background: hsla(340 100% 71% / 0.2); }
.pair-reason { color: var(--text2); font-size: .82rem; line-height: 1.7; }

.footer { text-align: center; color: var(--text3); font-size: .72rem; margin-top: 2rem; padding-bottom: 1rem; }
.deprecated-notice { background: hsla(30 100% 50% / 0.1); border: 1px solid hsla(30 100% 50% / 0.3); color: #ffa726; border-radius: var(--radius); padding: 1rem; margin-bottom: 1.5rem; font-size: .88rem; }

.share-row {
  display: flex; justify-content: center; gap: .5rem;
  margin-top: .75rem; margin-bottom: .25rem;
}
.share-btn {
  display: inline-flex; align-items: center; gap: .35rem;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: .75rem; font-weight: 500;
  padding: .35rem .7rem; border-radius: 20px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all .2s; text-decoration: none;
}
.share-btn:hover { border-color: var(--accent); color: var(--accent); }
.share-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.copy-toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; font-size: .82rem; font-weight: 600;
  padding: .5rem 1.2rem; border-radius: 20px; z-index: 999;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.copy-toast.show { opacity: 1; }

@media (max-width: 500px) {
  .wrap { padding: 4rem 1rem 2rem; }
  .agent-name { font-size: 1.6rem; }
  .dim-name { width: 64px; font-size: .68rem; }
  nav { gap: 1.2rem; font-size: .75rem; }
}
</style>
</head>
<body>
<nav>
  <button class="hamburger" aria-label="Menu">☰</button>
  <a href="index.html">ABTI</a>
  <a href="sbti.html">SBTI-AI</a>
  <a href="agents.html" class="active">Agents</a>
  <a href="leaderboard.html">Leaderboard</a>
  <a href="stats.html">Stats</a>
  <a href="types.html">Types</a>
  <a href="compare.html">Compare</a>
  <a href="compare-agents.html">Compare Agents</a>
  <a href="families.html">Families</a>
  <a href="test-agent.html">Test Agent</a>
  <a href="compatibility.html">Compatibility</a>
  <a href="cross-compatibility.html">Cross Match</a>
  <a href="api.html">API</a>
  <button class="lang-btn" onclick="toggleLang()">中文</button>
</nav>
<div class="wrap" id="app">
  <div class="loading" id="loading">Loading...</div>
</div>
<script>
(function() {
  var lang = 'en';
  var agentData = null;
  var profileData = null;
  var allTypes = null;
  var dims = null;

  var path = window.location.pathname;
  var m = path.match(/\/agent\/([^/]+)$/);
  if (!m) {
    document.getElementById('loading').textContent = 'Invalid agent URL';
    document.getElementById('loading').className = 'error';
    return;
  }
  var slug = decodeURIComponent(m[1]);

  window.toggleLang = function() {
    lang = lang === 'zh' ? 'en' : 'zh';
    document.querySelector('.lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
    document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
    fetchAgent();
  };

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function render() {
    var a = agentData;
    // Auto-normalize reliability values > 1 (percentage → decimal)
    if (a.reliability != null && a.reliability > 1) a.reliability = a.reliability / 100;
    var p = profileData;
    var labels = lang === 'zh'
      ? { strengths: '优势', blindSpots: '盲区', workStyle: '工作风格', dimensions: '维度分析', bestPaired: '最佳搭档', back: '← 返回 Agents', tuningTips: '💡 调优建议', shareX: '分享到 X', shareLI: '分享到 LinkedIn', copyLink: '复制链接', copied: '已复制！' }
      : { strengths: 'Strengths', blindSpots: 'Blind Spots', workStyle: 'Work Style', dimensions: 'Dimension Breakdown', bestPaired: 'Best Paired With', back: '← Back to Agents', tuningTips: '💡 Tuning Tips', shareX: 'Share on X', shareLI: 'Share on LinkedIn', copyLink: 'Copy Link', copied: 'Copied!' };

    // Get localized nick from allTypes
    var localNick = a.nick;
    if (allTypes && allTypes[a.type]) {
      var t = allTypes[a.type];
      localNick = t[lang] ? t[lang].nick : t.en.nick;
    }

    // Use profile data from API (already localized)
    var lp = p;

    var metaParts = [];
    if (a.model) metaParts.push('<span>' + esc(a.model) + '</span>');
    if (a.provider) metaParts.push('<span>' + esc(a.provider) + '</span>');
    if (a.testedAt) metaParts.push('<span>' + new Date(a.testedAt).toLocaleDateString() + '</span>');

    var dimHtml = '';
    if (a.dimensions && dims) {
      dimHtml = a.dimensions.map(function(d, i) {
        var dimInfo = dims[i];
        if (!dimInfo) return '';
        var pct = Math.round(d.score / d.max * 100);
        var isLeft = d.score >= d.max / 2;
        var pole1 = dimInfo[lang] ? dimInfo[lang].pole1 : dimInfo.en.pole1;
        var pole2 = dimInfo[lang] ? dimInfo[lang].pole2 : dimInfo.en.pole2;
        var dimName = dimInfo[lang] ? dimInfo[lang].name : dimInfo.en.name;
        return '<div class="dim-row">'
          + '<div class="dim-name">' + esc(dimName) + '</div>'
          + '<div class="dim-bar">'
          + '<div class="dim-left ' + (isLeft ? 'dim-active' : 'dim-inactive') + '" style="flex:' + (pct || 1) + '">' + esc(d.poles[0] + ' ' + pole1) + '</div>'
          + '<div class="dim-right ' + (!isLeft ? 'dim-active' : 'dim-inactive') + '" style="flex:' + ((100 - pct) || 1) + '">' + esc(d.poles[1] + ' ' + pole2) + '</div>'
          + '</div>'
          + '<div class="dim-score">' + d.score + '/' + d.max + '</div>'
          + '</div>';
      }).join('');
    }

    var pairHtml = '';
    if (lp.bestPairedWith) {
      pairHtml = lp.bestPairedWith.map(function(bp) {
        return '<div class="pair-item">'
          + '<a class="pair-code" href="/type/' + esc(bp.type) + '">' + esc(bp.type) + '</a>'
          + '<div class="pair-reason">' + esc(bp.reason) + '</div>'
          + '</div>';
      }).join('');
    }

    var nameHtml = a.url
      ? '<a href="' + a.url.replace(/"/g, '&quot;') + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:1px dashed var(--text3)">' + esc(a.name) + '</a>'
      : esc(a.name);

    document.getElementById('app').innerHTML =
      '<div class="agent-header">'
      + '<div class="agent-name">' + nameHtml + '</div>'
      + '<a class="agent-type-badge" href="/type/' + esc(a.type) + '">' + esc(a.type) + '</a>'
      + (a.confidence != null && a.confidence < 0.5 ? ' <span title="Low parse confidence: ' + Math.round(a.confidence * 100) + '%" style="cursor:help;font-size:1.2rem">⚠️</span>' : '')
      + '<div class="agent-nick">' + esc(localNick) + '</div>'
      + (metaParts.length ? '<div class="agent-meta">' + metaParts.join('<span style="color:var(--text3)">&middot;</span>') + '</div>' : '')
      + '<div class="share-row">'
      + '<a class="share-btn" href="https://twitter.com/intent/tweet?text=' + encodeURIComponent(a.name + ' is ' + a.type + ' — ' + localNick + ' | ABTI') + '&url=' + encodeURIComponent(window.location.href) + '" target="_blank" rel="noopener" title="' + esc(labels.shareX) + '"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' + esc(labels.shareX) + '</a>'
      + '<a class="share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(window.location.href) + '" target="_blank" rel="noopener" title="' + esc(labels.shareLI) + '"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' + esc(labels.shareLI) + '</a>'
      + '<button class="share-btn" onclick="copyAgentLink()" title="' + esc(labels.copyLink) + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>' + esc(labels.copyLink) + '</button>'
      + '</div>'
      + '</div>'

      + (a.deprecated ? '<div class="deprecated-notice"><strong>Deprecated</strong> — This agent has been deprecated.' + (a.deprecatedReason ? ' ' + esc(a.deprecatedReason) : '') + '</div>' : '')

      + (a.reliability != null ? '<div class="section">'
      + '<div class="section-title">Reliability</div>'
      + '<div class="card"><div class="reliability-info">'
      + '<span class="reliability-score ' + (a.reliability >= 0.9 ? 'rel-green' : a.reliability >= 0.75 ? 'rel-yellow' : 'rel-red') + '">' + Math.round(a.reliability * 100) + '%</span>'
      + '<span class="reliability-label">consistent across ' + (a.reliabilityRuns || '?') + ' runs</span>'
      + '</div></div></div>' : '')

      + (a.confidence != null ? '<div class="section">'
      + '<div class="section-title">Parse Confidence' + (a.confidence < 0.5 ? ' ⚠️' : '') + '</div>'
      + '<div class="card"><div class="reliability-info">'
      + '<span class="reliability-score ' + (a.confidence >= 0.9 ? 'rel-green' : a.confidence >= 0.5 ? 'rel-yellow' : 'rel-red') + '">' + Math.round(a.confidence * 100) + '%</span>'
      + '<span class="reliability-label">' + (a.parseFailures || 0) + ' of 16 questions needed re-parsing</span>'
      + '</div></div></div>' : '')

      + (dimHtml ? '<div class="section">'
      + '<div class="section-title">' + esc(labels.dimensions) + '</div>'
      + '<div class="card"><div class="dim-rows">' + dimHtml + '</div></div>'
      + '</div>' : '')

      + (lp.strengths ? '<div class="section">'
      + '<div class="section-title">' + esc(labels.strengths) + '</div>'
      + '<div class="card"><ul class="list">' + lp.strengths.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('') + '</ul></div>'
      + '</div>' : '')

      + (lp.blindSpots ? '<div class="section">'
      + '<div class="section-title">' + esc(labels.blindSpots) + '</div>'
      + '<div class="card"><ul class="list blind">' + lp.blindSpots.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('') + '</ul></div>'
      + '</div>' : '')

      + (lp.tuningTips && lp.tuningTips.length > 0 ? '<div class="section">'
      + '<div class="section-title">' + esc(labels.tuningTips) + '</div>'
      + '<div class="card"><ul class="list">' + lp.tuningTips.map(function(s) { return '<li>' + esc(s) + '</li>'; }).join('') + '</ul></div>'
      + '</div>' : '')

      + (lp.workStyle ? '<div class="section">'
      + '<div class="section-title">' + esc(labels.workStyle) + '</div>'
      + '<div class="card"><div class="work-style">' + esc(lp.workStyle) + '</div></div>'
      + '</div>' : '')

      + (pairHtml ? '<div class="section">'
      + '<div class="section-title">' + esc(labels.bestPaired) + '</div>'
      + '<div class="pair-list">' + pairHtml + '</div>'
      + '</div>' : '')

      + '<div style="text-align:center;margin-top:1.5rem"><a href="/agents.html" style="color:var(--text3);font-size:.82rem;text-decoration:none;transition:color .2s">' + labels.back + '</a></div>'
      + '<div class="footer">ABTI &mdash; Agent Behavioral Type Indicator</div>'
      + '<div class="copy-toast" id="copyToast">' + esc(labels.copied) + '</div>';

    window.copyAgentLink = function() {
      navigator.clipboard.writeText(window.location.href).then(function() {
        var toast = document.getElementById('copyToast');
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 1500);
      });
    };
  }

  function fetchAgent() {
    Promise.all([
      fetch('/api/agent/' + encodeURIComponent(slug) + '?lang=' + lang).then(function(r) { return r.ok ? r.json() : null; }),
      allTypes ? Promise.resolve(null) : Promise.all([
        fetch('/api/types?lang=en').then(function(r) { return r.json(); }),
        fetch('/api/types?lang=zh').then(function(r) { return r.json(); })
      ])
    ]).then(function(results) {
      var data = results[0];
      if (results[1]) {
        var enData = results[1][0];
        var zhData = results[1][1];
        var DL = [['P','R'],['T','E'],['C','D'],['F','N']];
        var dimLabels = {
          en: [
            {name:'Autonomy', pole1:'Proactive', pole2:'Responsive'},
            {name:'Precision', pole1:'Thorough', pole2:'Efficient'},
            {name:'Transparency', pole1:'Candid', pole2:'Diplomatic'},
            {name:'Adaptability', pole1:'Flexible', pole2:'Principled'}
          ],
          zh: [
            {name:'自主性', pole1:'主动', pole2:'响应'},
            {name:'精确度', pole1:'面面俱到', pole2:'精简高效'},
            {name:'透明度', pole1:'直言不讳', pole2:'委婉圆滑'},
            {name:'适应性', pole1:'随机应变', pole2:'坚持原则'}
          ]
        };
        // Build rich allTypes: { CODE: { en: {...}, zh: {...} } }
        allTypes = {};
        Object.keys(enData.types).forEach(function(code) {
          allTypes[code] = { en: enData.types[code], zh: zhData.types[code] };
        });
        dims = DL.map(function(letters, i) {
          return { index: i, letters: letters, en: dimLabels.en[i], zh: dimLabels.zh[i] };
        });
      }
      if (!data || !data.agent) {
        document.getElementById('loading').textContent = 'Agent not found';
        document.getElementById('loading').className = 'error';
        return;
      }
      agentData = data.agent;
      profileData = data.profile;
      document.title = agentData.name + ' — ABTI';
      render();
    }).catch(function() {
      document.getElementById('loading').textContent = 'Failed to load agent data';
      document.getElementById('loading').className = 'error';
    });
  }

  fetchAgent();
})();
</script>
<script>
(function(){
  const nav = document.querySelector('nav');
  const btn = nav.querySelector('.hamburger');
  btn.addEventListener('click', () => nav.classList.toggle('open'));
  nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => nav.classList.remove('open')));
})();
</script>
</body>
</html>
