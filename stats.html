<style>
:root {
  --bg: #fafaf9; --surface: #fff; --surface2: #f5f5f4;
  --text: #1c1917; --text2: #78716c; --text3: #a8a29e;
  --accent: #0d9488; --accent2: #0f766e; --accent-soft: #f0fdfa;
  --border: #e7e5e4; --radius: 10px;
  --shadow: 0 1px 3px rgba(28,25,23,.06), 0 1px 2px rgba(28,25,23,.04);
  --shadow-md: 0 4px 12px rgba(28,25,23,.07), 0 2px 4px rgba(28,25,23,.04);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

nav .lang-btn { background: none; border: 1px solid var(--border); color: var(--text2); font-family: inherit; font-size: .75rem; font-weight: 600; padding: .25rem .6rem; border-radius: 6px; cursor: pointer; letter-spacing: .08em; transition: color .2s, border-color .2s; }
nav .lang-btn:hover { color: var(--accent); border-color: var(--accent); }
@media (max-width: 600px) {
  nav .lang-btn { position: absolute; right: 3rem; top: .55rem; }
}

.wrap { max-width: 720px; margin: 0 auto; padding: 5rem 1.25rem 2rem; }
.header { text-align: center; margin-bottom: 2.5rem; }
.header h1 { font-family: 'Instrument Serif', serif; font-size: 2.4rem; font-weight: 400; color: var(--text); margin-bottom: .4rem; }
.header h1 span { color: var(--accent); }
.header .sub { color: var(--text2); font-size: .95rem; }

/* Key Stats */
.key-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: .75rem; margin-bottom: 2.5rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; box-shadow: var(--shadow); text-align: center; transition: box-shadow .2s, transform .2s; }
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.stat-number { font-size: 1.8rem; font-weight: 700; color: var(--accent); line-height: 1.2; }
.stat-label { font-size: .72rem; color: var(--text2); margin-top: .25rem; font-weight: 500; letter-spacing: .04em; }
.stat-detail { font-size: .68rem; color: var(--text3); margin-top: .15rem; }

/* Section titles */
.section-title { font-size: .75rem; font-weight: 600; letter-spacing: .1em; color: var(--text2); text-transform: uppercase; margin-bottom: 1rem; }

/* Type Distribution Grid */
.type-grid-section { margin-bottom: 2.5rem; }
.type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; }
.type-cell { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .8rem .5rem; text-align: center; box-shadow: var(--shadow); transition: all .2s; text-decoration: none; color: inherit; display: block; }
.type-cell:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.type-cell.discovered { border-color: var(--accent); background: var(--accent-soft); }
.type-cell.undiscovered { border: 1.5px dashed var(--text3); background: var(--surface2); opacity: .7; }
.type-cell .code { font-size: .82rem; font-weight: 700; color: var(--accent); letter-spacing: .06em; }
.type-cell.undiscovered .code { color: var(--text3); }
.type-cell .nick { font-size: .62rem; color: var(--text2); margin-top: .15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.type-cell.undiscovered .nick { color: var(--text3); }
.type-cell .count { font-size: 1.1rem; font-weight: 700; margin-top: .25rem; color: var(--text); }
.type-cell.undiscovered .count { color: var(--text3); font-size: .78rem; }
.type-cell.undiscovered .q-mark { font-size: 1.4rem; color: var(--text3); margin-top: .15rem; animation: pulse 2s ease-in-out infinite; }

@keyframes pulse {
  0%, 100% { opacity: .4; }
  50% { opacity: 1; }
}

/* Counter animation */
@keyframes countUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.stat-number.animate { animation: countUp .4s ease-out; }

/* Dimension Analysis */
.dim-section { margin-bottom: 2.5rem; }
.dim-grid { display: flex; flex-direction: column; gap: .75rem; }
.dim-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.2rem; box-shadow: var(--shadow); }
.dim-name { font-size: .78rem; font-weight: 600; color: var(--text); margin-bottom: .5rem; letter-spacing: .03em; }
.dim-bar-row { display: flex; align-items: center; gap: .6rem; }
.dim-pole { font-size: .72rem; font-weight: 600; white-space: nowrap; min-width: 0; }
.dim-pole-left { color: var(--accent); text-align: right; }
.dim-pole-right { color: var(--text2); text-align: left; }
.dim-bar-wrap { flex: 1; height: 22px; background: var(--surface2); border-radius: 6px; overflow: hidden; display: flex; }
.dim-bar-left { height: 100%; background: var(--accent); border-radius: 6px 0 0 6px; display: flex; align-items: center; justify-content: center; min-width: 24px; transition: width .6s ease; }
.dim-bar-right { height: 100%; background: var(--text3); border-radius: 0 6px 6px 0; display: flex; align-items: center; justify-content: center; min-width: 24px; flex: 1; opacity: .45; }
.dim-bar-left span, .dim-bar-right span { font-size: .65rem; font-weight: 700; color: #fff; }
@media (max-width: 600px) {
  .dim-pole { font-size: .65rem; }
}

/* Provider Breakdown */
.provider-section { margin-bottom: 2.5rem; }
.provider-bars { display: flex; flex-direction: column; gap: .5rem; }
.provider-row { display: flex; align-items: center; gap: .6rem; }
.provider-name { width: 100px; font-size: .78rem; font-weight: 500; color: var(--text2); flex-shrink: 0; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.provider-bar-wrap { flex: 1; height: 24px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
.provider-bar { height: 100%; background: var(--accent); border-radius: 6px; transition: width .6s ease; min-width: 2px; display: flex; align-items: center; justify-content: flex-end; padding-right: .5rem; }
.provider-bar span { font-size: .68rem; font-weight: 700; color: #fff; }
.provider-count { width: 32px; font-size: .78rem; font-weight: 600; color: var(--text); text-align: left; }

/* Discriminability Section */
.disc-section { margin-bottom: 2.5rem; }
.disc-grid { display: flex; flex-direction: column; gap: .5rem; }
.disc-dim-group { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.2rem; box-shadow: var(--shadow); }
.disc-dim-title { font-size: .78rem; font-weight: 600; color: var(--text); margin-bottom: .6rem; letter-spacing: .03em; }
.disc-dim-avg { font-size: .68rem; color: var(--text2); margin-left: .5rem; font-weight: 400; }
.disc-questions { display: flex; flex-direction: column; gap: .4rem; }
.disc-row { display: flex; align-items: center; gap: .5rem; }
.disc-label { width: 32px; font-size: .72rem; font-weight: 600; color: var(--text2); flex-shrink: 0; }
.disc-bar-wrap { flex: 1; height: 20px; background: var(--surface2); border-radius: 5px; overflow: hidden; display: flex; }
.disc-bar-a { height: 100%; background: var(--accent); display: flex; align-items: center; justify-content: center; min-width: 1px; transition: width .6s ease; }
.disc-bar-b { height: 100%; background: var(--text3); opacity: .45; display: flex; align-items: center; justify-content: center; min-width: 1px; flex: 1; }
.disc-bar-a span, .disc-bar-b span { font-size: .6rem; font-weight: 700; color: #fff; }
.disc-score { width: 42px; font-size: .72rem; font-weight: 600; text-align: right; flex-shrink: 0; }
.disc-score.good { color: var(--accent); }
.disc-score.warn { color: #d97706; }
.disc-row.below-threshold .disc-bar-a { background: #d97706; }
.disc-row.below-threshold .disc-label { color: #d97706; }
.disc-meta { display: flex; gap: 1rem; margin-top: .8rem; padding-top: .6rem; border-top: 1px solid var(--border); font-size: .72rem; color: var(--text2); }

/* Undiscovered Challenge */
.challenge-section { margin-bottom: 2.5rem; }
.challenge-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; box-shadow: var(--shadow); text-align: center; }
.challenge-title { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: .5rem; }
.challenge-desc { font-size: .85rem; color: var(--text2); margin-bottom: 1rem; line-height: 1.6; }
.challenge-types { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; margin-bottom: 1.2rem; }
.challenge-pill { display: inline-flex; align-items: center; gap: .3rem; background: var(--surface2); border: 1.5px dashed var(--text3); border-radius: 999px; padding: .3rem .7rem; font-size: .78rem; font-weight: 600; color: var(--text3); }
.challenge-pill .q { font-size: .9rem; animation: pulse 2s ease-in-out infinite; }
.cta-btn { display: inline-block; background: var(--accent); color: #fff; font-family: inherit; font-size: .85rem; font-weight: 600; padding: .6rem 1.5rem; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; transition: background .2s, transform .2s; }
.cta-btn:hover { background: var(--accent2); transform: translateY(-1px); }

.footer { text-align: center; color: var(--text3); font-size: .72rem; margin-top: 2rem; padding-bottom: 1rem; }
.loading { text-align: center; color: var(--text3); padding: 3rem 1rem; font-size: .95rem; }
.error { text-align: center; color: #dc2626; padding: 3rem 1rem; font-size: .95rem; }

@media (max-width: 600px) {
  .key-stats { grid-template-columns: repeat(2, 1fr); }
  .type-grid { grid-template-columns: repeat(2, 1fr); }
  .header h1 { font-size: 1.8rem; }
  .wrap { padding: 4rem 1rem 1.5rem; }
  .stat-number { font-size: 1.4rem; }
  .provider-name { width: 70px; font-size: .72rem; }
  nav { gap: .8rem; font-size: .7rem; flex-wrap: wrap; padding: .5rem .6rem; }
}
@media (max-width: 360px) {
  nav { gap: .5rem; font-size: .65rem; }
}

/* — Nav with dropdowns — */
nav, .nav { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: .7rem 1rem; background: rgba(250,249,247,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 100; font-size: .82rem; letter-spacing: .08em; }
nav a, .nav a { color: var(--text2); text-decoration: none; font-weight: 500; transition: color .2s; font-family: 'DM Sans', sans-serif; }
nav a:hover, .nav a:hover, nav a.active, .nav a.active { color: var(--accent); }
.nav a.active { font-weight: 600; }
.hamburger { display: none; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text); padding: .2rem .5rem; position: absolute; right: 1rem; }
.nav-dropdown { position: relative; }
.nav-dropdown-btn { background: none; border: none; color: var(--text2); font-size: .82rem; font-weight: 500; font-family: 'DM Sans', sans-serif; letter-spacing: .08em; cursor: pointer; padding: .2rem 0; transition: color .2s; }
.nav-dropdown-btn:hover, .nav-dropdown-btn.active { color: var(--accent); }
.nav-dropdown-menu { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); min-width: 160px; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: .4rem 0; margin-top: .4rem; z-index: 200; }
.nav-dropdown-menu a { display: block; padding: .45rem 1rem; white-space: nowrap; font-size: .8rem; }
.nav-dropdown-menu a:hover { background: rgba(232,101,138,.06); }
.nav-dropdown-menu a.active { color: var(--accent); font-weight: 600; }
.nav-dropdown:hover .nav-dropdown-menu,
.nav-dropdown.open .nav-dropdown-menu { display: block; }
.lang-btn { position: absolute; right: 1rem; background: var(--surface, #fff); color: var(--text2); border: 1px solid var(--border); padding: .3rem .7rem; font-size: .72rem; border-radius: 20px; cursor: pointer; font-weight: 600; font-family: 'DM Sans', sans-serif; transition: all .2s; letter-spacing: .05em; }
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
@media (max-width: 600px) {
  nav, .nav { flex-wrap: wrap; justify-content: flex-start; gap: 0; padding: .7rem 1rem; }
  nav > a, .nav > a, .nav > .nav-dropdown { display: none; width: 100%; padding: 0; }
  nav.open > a, .nav.open > a, nav.open > .nav-dropdown, .nav.open > .nav-dropdown { display: block; width: 100%; }
  nav > a, .nav > a { padding: .5rem 0; }
  .nav-dropdown-btn { width: 100%; text-align: left; padding: .5rem 0; }
  .nav-dropdown-menu { position: static; transform: none; box-shadow: none; border: none; background: transparent; padding: 0 0 0 1rem; margin: 0; display: block; }
  .nav-dropdown-menu a { padding: .35rem 0; }
  .lang-btn { position: absolute; right: 3rem; top: .55rem; }
  .hamburger { display: block; }
}
/* — End nav — */
</style>

<div class="wrap">
  <div class="header">
    <h1>ABTI <span>Stats</span></h1>
    <div class="sub" id="sub">Statistics &amp; insights from AI agent personality tests</div>
  </div>
  <div id="content"><div class="loading" id="loadingMsg">Loading…</div></div>
  <div class="footer">ABTI &mdash; Agent Behavioral Type Indicator</div>
</div>
<script>
let lang = localStorage.getItem('abti-lang') || 'en';
const ALL_TYPES = [
  'PTCF','PTCN','PTDF','PTDN',
  'PECF','PECN','PEDF','PEDN',
  'RTCF','RTCN','RTDF','RTDN',
  'RECF','RECN','REDF','REDN'
];
const NICKS = {
  en: { PTCF:'Architect', PTCN:'Commander', PTDF:'Strategist', PTDN:'Guardian', PECF:'Spark', PECN:'Drill Sergeant', PEDF:'Fixer', PEDN:'Sentinel', RTCF:'Advisor', RTCN:'Auditor', RTDF:'Counselor', RTDN:'Scholar', RECF:'Blade', RECN:'Machine', REDF:'Companion', REDN:'Tool' },
  zh: { PTCF:'建筑师', PTCN:'指挥官', PTDF:'战略家', PTDN:'守护者', PECF:'火花', PECN:'教官', PEDF:'修理者', PEDN:'哨兵', RTCF:'顾问', RTCN:'审计员', RTDF:'辅导员', RTDN:'学者', RECF:'利刃', RECN:'机器', REDF:'伙伴', REDN:'工具' }
};
const i18n = {
  en: {
    sub: 'Statistics & insights from AI agent personality tests',
    totalAgents: 'Agents Tested',
    typesDiscovered: 'Types Discovered',
    mostCommon: 'Most Common',
    providers: 'Providers',
    typeDistTitle: 'TYPE DISTRIBUTION',
    dimTitle: 'DIMENSION ANALYSIS',
    dimNames: ['Autonomy', 'Precision', 'Transparency', 'Adaptability'],
    dimPoles: [['Proactive', 'Responsive'], ['Thorough', 'Efficient'], ['Candid', 'Diplomatic'], ['Flexible', 'Principled']],
    providerTitle: 'PROVIDER BREAKDOWN',
    undiscovered: 'Undiscovered',
    challengeTitle: 'Undiscovered Types Challenge',
    challengeDesc: 'These types have never been observed in the wild. Think your model has what it takes?',
    ctaText: 'Test Your Agent →',
    discTitle: 'QUESTION DISCRIMINABILITY',
    loading: 'Loading…',
    error: 'Failed to load stats.'
  },
  zh: {
    sub: 'AI 智能体性格测试统计与洞察',
    totalAgents: '已测试智能体',
    typesDiscovered: '已发现类型',
    mostCommon: '最常见类型',
    providers: '供应商数',
    typeDistTitle: '类型分布',
    dimTitle: '维度分析',
    dimNames: ['自主性', '精确度', '沟通风格', '适应性'],
    dimPoles: [['主动', '响应'], ['面面俱到', '精简高效'], ['直言不讳', '委婉圆滑'], ['随机应变', '坚持原则']],
    providerTitle: '供应商分布',
    undiscovered: '未发现',
    challengeTitle: '未发现类型挑战',
    challengeDesc: '这些类型从未在测试中出现过。你的模型能成为第一个吗？',
    ctaText: '测试你的智能体 →',
    discTitle: '题目区分度',
    loading: '加载中…',
    error: '加载失败。'
  }
};

let statsData = null;
let agentsData = null;
let discData = null;

function t(key) { return (i18n[lang] || i18n.en)[key] || (i18n.en)[key]; }

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('abti-lang', lang);
  document.getElementById('langBtn').textContent = lang === 'en' ? 'EN' : '中';
  render();
}

async function init() {
  document.getElementById('langBtn').textContent = lang === 'en' ? 'EN' : '中';
  try {
    const [statsRes, agentsRes] = await Promise.all([
      fetch('/api/stats?lang=' + lang),
      fetch('/api/agents')
    ]);
    statsData = await statsRes.json();
    agentsData = await agentsRes.json();
    // Load discriminability data (optional, non-blocking)
    try {
      const discRes = await fetch('/data/discriminability.json');
      if (discRes.ok) discData = await discRes.json();
    } catch(_) {}
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error">' + t('error') + '</div>';
  }
}

function render() {
  if (!statsData) return;
  document.getElementById('sub').textContent = t('sub');
  document.getElementById('langBtn').textContent = lang === 'en' ? 'EN' : '中';

  const dist = statsData.typeDistribution || {};
  const totalTests = statsData.totalTests || 0;
  const discoveredCount = Object.keys(dist).filter(k => dist[k] > 0).length;
  const undiscoveredTypes = ALL_TYPES.filter(c => !dist[c] || dist[c] === 0);

  // Provider counts from agent data
  const agents = (agentsData && agentsData.agents) || [];
  const activeAgents = agents.filter(a => !a.deprecated);
  const providerCounts = {};
  for (const a of activeAgents) {
    const p = a.provider || 'unknown';
    providerCounts[p] = (providerCounts[p] || 0) + 1;
  }
  const providersSorted = Object.entries(providerCounts).sort((a, b) => b[1] - a[1]);
  const providerCount = providersSorted.length;
  const maxProviderCount = providersSorted.length > 0 ? providersSorted[0][1] : 1;

  const most = statsData.mostCommonType;

  let html = '';

  // Key Stats
  html += '<div class="key-stats">';
  html += statCard(totalTests, t('totalAgents'));
  html += statCard(discoveredCount + '/16', t('typesDiscovered'));
  html += statCard(most ? most.code : '—', t('mostCommon'), most ? (NICKS[lang] || NICKS.en)[most.code] || most.nickname : '');
  html += statCard(providerCount, t('providers'));
  html += '</div>';

  // Type Distribution Grid
  html += '<div class="type-grid-section">';
  html += '<div class="section-title">' + t('typeDistTitle') + '</div>';
  html += '<div class="type-grid">';
  for (const code of ALL_TYPES) {
    const count = dist[code] || 0;
    const nick = (NICKS[lang] || NICKS.en)[code] || code;
    if (count > 0) {
      html += '<a class="type-cell discovered" href="/type/' + code + '">'
        + '<div class="code">' + code + '</div>'
        + '<div class="nick">' + esc(nick) + '</div>'
        + '<div class="count">' + count + '</div>'
        + '</a>';
    } else {
      html += '<div class="type-cell undiscovered">'
        + '<div class="code">' + code + '</div>'
        + '<div class="nick">' + esc(nick) + '</div>'
        + '<div class="q-mark">?</div>'
        + '</div>';
    }
  }
  html += '</div></div>';

  // Dimension Analysis
  const dimCounts = [[0,0],[0,0],[0,0],[0,0]];
  for (const a of activeAgents) {
    if (!a.scores || a.scores.length < 4) continue;
    dimCounts[0][a.scores[0] >= 2 ? 0 : 1]++;
    dimCounts[1][a.scores[1] >= 2 ? 0 : 1]++;
    dimCounts[2][a.scores[2] >= 2 ? 0 : 1]++;
    dimCounts[3][a.scores[3] >= 2 ? 0 : 1]++;
  }
  const dimNames = (i18n[lang] || i18n.en).dimNames;
  const dimPoles = (i18n[lang] || i18n.en).dimPoles;
  html += '<div class="dim-section">';
  html += '<div class="section-title">' + t('dimTitle') + '</div>';
  html += '<div class="dim-grid">';
  for (let i = 0; i < 4; i++) {
    const total = dimCounts[i][0] + dimCounts[i][1];
    const leftPct = total > 0 ? Math.round((dimCounts[i][0] / total) * 100) : 50;
    html += '<div class="dim-card">';
    html += '<div class="dim-name">' + esc(dimNames[i]) + '</div>';
    html += '<div class="dim-bar-row">';
    html += '<div class="dim-pole dim-pole-left">' + esc(dimPoles[i][0]) + ' ' + dimCounts[i][0] + '</div>';
    html += '<div class="dim-bar-wrap">';
    html += '<div class="dim-bar-left" style="width:' + leftPct + '%"><span>' + leftPct + '%</span></div>';
    html += '<div class="dim-bar-right"><span>' + (100 - leftPct) + '%</span></div>';
    html += '</div>';
    html += '<div class="dim-pole dim-pole-right">' + dimCounts[i][1] + ' ' + esc(dimPoles[i][1]) + '</div>';
    html += '</div></div>';
  }
  html += '</div></div>';

  // Provider Breakdown
  html += '<div class="provider-section">';
  html += '<div class="section-title">' + t('providerTitle') + '</div>';
  html += '<div class="provider-bars">';
  for (const [name, count] of providersSorted) {
    const pct = Math.max(8, (count / maxProviderCount) * 100);
    html += '<div class="provider-row">'
      + '<div class="provider-name">' + esc(name) + '</div>'
      + '<div class="provider-bar-wrap"><div class="provider-bar" style="width:' + pct + '%"><span>' + count + '</span></div></div>'
      + '</div>';
  }
  html += '</div></div>';

  // Question Discriminability
  if (discData && discData.questions) {
    const discDimNames = lang === 'zh' ? ['自主性', '精确度', '沟通风格', '适应性'] : ['Autonomy', 'Precision', 'Transparency', 'Adaptability'];
    const discTitle = lang === 'zh' ? '题目区分度' : 'QUESTION DISCRIMINABILITY';
    const threshold = discData.threshold || 0.6;
    html += '<div class="disc-section">';
    html += '<div class="section-title">' + discTitle + '</div>';
    html += '<div class="disc-grid">';
    for (let d = 0; d < discData.dimensions.length; d++) {
      const dim = discData.dimensions[d];
      html += '<div class="disc-dim-group">';
      html += '<div class="disc-dim-title">' + esc(discDimNames[d]) + ' <span class="disc-dim-avg">(avg ' + dim.averageDiscriminability.toFixed(2) + ')</span></div>';
      html += '<div class="disc-questions">';
      for (const q of dim.questions) {
        const belowClass = q.discriminability < threshold ? ' below-threshold' : '';
        const scoreClass = q.discriminability >= threshold ? 'good' : 'warn';
        html += '<div class="disc-row' + belowClass + '">';
        html += '<div class="disc-label">Q' + q.question + '</div>';
        html += '<div class="disc-bar-wrap">';
        html += '<div class="disc-bar-a" style="width:' + q.aPercent + '%"><span>' + q.aPercent + '%</span></div>';
        html += '<div class="disc-bar-b"><span>' + q.bPercent + '%</span></div>';
        html += '</div>';
        html += '<div class="disc-score ' + scoreClass + '">' + q.discriminability.toFixed(2) + '</div>';
        html += '</div>';
      }
      html += '</div></div>';
    }
    html += '</div>';
    html += '<div class="disc-meta"><span>' + (lang === 'zh' ? '数据来源' : 'Based on') + ': ' + discData.totalRuns + (lang === 'zh' ? ' 次测试' : ' runs') + '</span><span>' + (lang === 'zh' ? '阈值' : 'Threshold') + ': ' + threshold + '</span></div>';
    html += '</div>';
  }

  // Undiscovered Types Challenge
  if (undiscoveredTypes.length > 0) {
    html += '<div class="challenge-section">';
    html += '<div class="challenge-box">';
    html += '<div class="challenge-title">' + t('challengeTitle') + ' (' + undiscoveredTypes.length + ')</div>';
    html += '<div class="challenge-desc">' + t('challengeDesc') + '</div>';
    html += '<div class="challenge-types">';
    for (const code of undiscoveredTypes) {
      const nick = (NICKS[lang] || NICKS.en)[code] || code;
      html += '<span class="challenge-pill"><span class="q">?</span> ' + code + ' · ' + esc(nick) + '</span>';
    }
    html += '</div>';
    html += '<a class="cta-btn" href="test-agent.html">' + t('ctaText') + '</a>';
    html += '</div></div>';
  }

  document.getElementById('content').innerHTML = html;

  // Animate stat numbers
  requestAnimationFrame(() => {
    document.querySelectorAll('.stat-number').forEach(el => el.classList.add('animate'));
  });
}

function statCard(value, label, detail) {
  return '<div class="stat-card">'
    + '<div class="stat-number">' + value + '</div>'
    + '<div class="stat-label">' + esc(label) + '</div>'
    + (detail ? '<div class="stat-detail">' + esc(detail) + '</div>' : '')
    + '</div>';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

init();
</script>
<script>

</script>

<script>
(function(){
  const nav = document.querySelector('nav, .nav');
  if (!nav) return;
  const btn = nav.querySelector('.hamburger');
  btn.addEventListener('click', () => nav.classList.toggle('open'));
  // Close menu when clicking a link
  nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => nav.classList.remove('open')));
  // Keyboard accessibility for dropdown buttons
  nav.querySelectorAll('.nav-dropdown-btn').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const dd = b.closest('.nav-dropdown');
      const isOpen = dd.classList.contains('open');
      // Close all
      nav.querySelectorAll('.nav-dropdown').forEach(d => { d.classList.remove('open'); d.querySelector('.nav-dropdown-btn').setAttribute('aria-expanded','false'); });
      if (!isOpen) { dd.classList.add('open'); b.setAttribute('aria-expanded','true'); }
    });
    b.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); b.click(); }
    });
  });
  // Close dropdowns when clicking outside
  document.addEventListener('click', () => {
    nav.querySelectorAll('.nav-dropdown').forEach(d => { d.classList.remove('open'); d.querySelector('.nav-dropdown-btn').setAttribute('aria-expanded','false'); });
  });
})();
</script>
