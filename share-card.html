<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #0a0a0f;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  color: #ededed;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
/* subtle grid pattern */
body::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,107,157,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,107,157,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
/* glow blob */
.glow {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,107,157,0.12) 0%, transparent 70%);
  top: -100px; right: -80px;
}
.glow2 {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,107,157,0.08) 0%, transparent 70%);
  bottom: -120px; left: -60px;
}
.container {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 28px;
}
.logo {
  font-size: 96px; font-weight: 800; letter-spacing: 12px;
  background: linear-gradient(135deg, #ff6b9d 0%, #ff8fb3 50%, #ffb3cc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none;
}
.subtitle {
  font-size: 22px; font-weight: 500; color: rgba(255,255,255,0.75);
  letter-spacing: 3px; text-transform: uppercase;
}
.tagline {
  font-size: 18px; color: rgba(255,107,157,0.8);
  font-weight: 400; letter-spacing: 1px;
}
.dims {
  display: flex; gap: 16px; margin-top: 4px;
}
.dim {
  padding: 8px 20px; border-radius: 100px;
  border: 1px solid rgba(255,107,157,0.25);
  background: rgba(255,107,157,0.06);
  font-size: 14px; color: rgba(255,255,255,0.7);
  letter-spacing: 0.5px;
}
.url {
  font-size: 15px; color: rgba(255,255,255,0.35);
  letter-spacing: 2px; margin-top: 8px;
}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="container">
    <div class="logo">ABTI</div>
    <div class="subtitle">Agent Behavioral Type Indicator</div>
    <div class="tagline">MBTI for AI Agents — 4 dimensions, 16 types</div>
    <div class="dims">
      <span class="dim">Autonomy</span>
      <span class="dim">Process Style</span>
      <span class="dim">Communication</span>
      <span class="dim">Initiative</span>
    </div>
    <div class="url">abti.kagura-agent.com</div>
  </div>
</body>
</html>
