<html lang="zh">
<head>

<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #252525;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #f4a7bb;
  --accent2: #d4849b;
  --accent-glow: rgba(244, 167, 187, 0.15);
  --radius: 12px;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: center; align-items: center; gap: 2rem;
  padding: 0.75rem;
  background: rgba(13, 13, 13, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
  z-index: 100; font-size: 0.85rem;
}
.nav a { color: var(--text2); text-decoration: none; transition: color 0.2s; letter-spacing: 0.1em; }
.nav a:hover { color: var(--accent); }
.nav a.active { color: var(--accent); font-weight: 600; }
.lang-btn {
  position: absolute; right: 1rem;
  background: var(--surface2); color: var(--text2); border: 1px solid #444;
  padding: 0.3rem 0.75rem; font-size: 0.75rem; border-radius: 20px;
  cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em; font-weight: 600;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }

.container {
  max-width: 680px; margin: 0 auto; padding: 4rem 1.5rem 2rem;
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
}

.section { display: none; }
.section.active { display: block; }

/* Landing */
#landing { text-align: center; }
#landing .hero-emoji { font-size: 5rem; margin-bottom: 1.5rem; display: block; }
#landing h1 {
  font-size: 2.4rem; font-weight: 200; letter-spacing: 0.2em;
  color: var(--accent); margin-bottom: 1rem;
}
#landing .tagline {
  font-size: 1.15rem; color: var(--text2); margin-bottom: 3rem; line-height: 1.6;
}
.btn {
  background: var(--accent); color: #000; border: none;
  padding: 1rem 3rem; font-size: 1.1rem; font-weight: 600;
  border-radius: 50px; cursor: pointer; transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

/* Quiz */
.progress-wrap { margin-bottom: 2rem; }
.progress-bar { width: 100%; height: 3px; background: var(--surface); border-radius: 2px; overflow: hidden; margin-bottom: 0.5rem; }
.progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; }
.progress-text { font-size: 0.75rem; color: var(--text2); text-align: right; letter-spacing: 0.1em; }
.question-text { font-size: 1.2rem; line-height: 1.6; margin-bottom: 2rem; min-height: 3.5rem; }
.choices { display: flex; flex-direction: column; gap: 0.75rem; }
.choice-btn { background: var(--surface); border: 1px solid #333; border-radius: var(--radius); padding: 1rem 1.25rem; color: var(--text); font-size: 0.95rem; cursor: pointer; transition: all 0.25s; text-align: left; line-height: 1.5; }
@media (hover: hover) {
  .choice-btn:hover { border-color: var(--accent); background: var(--surface2); }
}
.choice-btn:active, .choice-btn.selected { border-color: var(--accent); background: var(--accent-glow); }
.choice-btn.selected { border-color: var(--accent); background: var(--accent-glow); }

/* Result */
#result { text-align: center; }
.result-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; }
.result-type { font-size: 2rem; font-weight: 200; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.5rem; }
.result-subtitle { color: var(--text2); font-size: 1rem; margin-bottom: 2rem; }
.result-desc { color: var(--text2); line-height: 1.7; font-size: 0.95rem; margin-bottom: 2rem; }
.result-traits { background: var(--surface); border-radius: var(--radius); padding: 1.25rem; border: 1px solid #333; margin-bottom: 2rem; text-align: left; }
.result-traits h3 { font-size: 0.85rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.75rem; }
.result-traits ul { list-style: none; }
.result-traits li { color: var(--text2); font-size: 0.9rem; padding: 0.3rem 0; }
.result-traits li::before { content: ''; margin-right: 0.5rem; }

/* Dimension bars */
.dim-bars { margin-bottom: 2rem; text-align: left; }
.dim-bar-row { margin-bottom: 0.75rem; }
.dim-bar-label { font-size: 0.75rem; color: var(--text2); letter-spacing: 0.08em; margin-bottom: 0.3rem; display: flex; justify-content: space-between; }
.dim-bar-track { width: 100%; height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.dim-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.dim-bar-fill.low { background: var(--green); }
.dim-bar-fill.med { background: var(--yellow); }
.dim-bar-fill.high { background: var(--red); }

.share-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
.share-btn { background: var(--surface2); color: var(--text); border: 1px solid #444; padding: 0.6rem 1.25rem; border-radius: 50px; font-size: 0.85rem; cursor: pointer; transition: all 0.25s; }
.share-btn:hover { border-color: var(--accent); color: var(--accent); }
.screenshot-btn {
  background: var(--accent); color: #000; border: none;
  padding: 0.75rem 2rem; font-size: 1rem; font-weight: 600;
  border-radius: 50px; cursor: pointer; transition: all 0.3s;
}
.screenshot-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
.screenshot-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* Footer */
.footer {
  text-align: center; padding: 2rem 0 1rem; font-size: 0.75rem; color: #555;
}
.footer a { color: var(--text2); text-decoration: none; }
.footer a:hover { color: var(--accent); }

/* Result GIF */
.result-gif {
  max-width: 280px; border-radius: var(--radius);
  box-shadow: 0 0 20px var(--accent-glow), 0 4px 15px rgba(0,0,0,0.4);
  margin: 0 auto 1.5rem; display: block;
  opacity: 0; animation: gifFadeIn 0.6s ease 0.3s forwards;
}
@keyframes gifFadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* Animations */
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-18px); }
  60% { transform: translateY(-8px); }
}
.fade-in { animation: fadeSlide 0.4s ease forwards; }
.bounce { animation: bounce 0.6s ease; }

/* Screen shake for high-waste types */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  10% { transform: translateX(-8px) rotate(-1deg); }
  20% { transform: translateX(8px) rotate(1deg); }
  30% { transform: translateX(-6px) rotate(-0.5deg); }
  40% { transform: translateX(6px) rotate(0.5deg); }
  50% { transform: translateX(-4px); }
  60% { transform: translateX(4px); }
  70% { transform: translateX(-2px); }
  80% { transform: translateX(2px); }
}
.shake { animation: shake 0.6s ease; }

/* Emoji rain */
.emoji-rain {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}
.emoji-rain span {
  position: absolute; top: -50px; font-size: 1.5rem;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Zen glow for low-waste types */
@keyframes zenGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.05); }
  50% { box-shadow: 0 0 40px rgba(74, 222, 128, 0.15), 0 0 80px rgba(74, 222, 128, 0.05); }
}
.zen-glow { animation: zenGlow 3s ease-in-out infinite; border: 1px solid rgba(74, 222, 128, 0.15); border-radius: var(--radius); padding: 1rem; }

/* Mobile */
@media (max-width: 500px) {
  #landing h1 { font-size: 1.8rem; letter-spacing: 0.12em; }
  #landing .hero-emoji { font-size: 3.5rem; }
  .question-text { font-size: 1.05rem; }
  .result-type { font-size: 1.5rem; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html">ABTI</a>
  <a href="sbti-v2.html" class="active">SBTI-AI</a>
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
</nav>

<div class="container">

  <!-- Landing -->
  <div id="landing" class="section active">
    <span class="hero-emoji">💸</span>
    <h1>SBTI-AI</h1>
    <p class="tagline" data-en="How wasteful is your AI agent?" data-zh="你的 AI agent 有多浪费？">How wasteful is your AI agent?</p>
    <p style="color:var(--text2);font-size:0.85rem;margin-top:0.5rem" data-en="🦞 Lobster-Certified Token Assessment" data-zh="🦞 龙虾认证 Token 评估">🦞 Lobster-Certified Token Assessment</p>
    <button class="btn" onclick="startQuiz()" data-en="Begin Audit" data-zh="开始审计">Begin Audit</button>
  </div>

  <!-- Quiz -->
  <div id="quiz" class="section">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">1 / ?</div>
    </div>
    <div id="questionArea" class="fade-in">
      <p class="question-text" id="questionText"></p>
      <div class="choices" id="choices">
        <button class="choice-btn" onclick="pick(0)"></button>
        <button class="choice-btn" onclick="pick(1)"></button>
        <button class="choice-btn" onclick="pick(2)"></button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="section">
    <span class="result-emoji bounce" id="resultEmoji" style="display:none"></span>
    <img id="resultGif" class="result-gif" alt="" style="display:none" loading="lazy">
    <h2 class="result-type" id="resultType"></h2>
    <p class="result-subtitle" id="resultSubtitle"></p>
    <p class="result-desc" id="resultDesc"></p>
    <div class="dim-bars" id="dimBars">
      <div class="dim-bar-row">
        <div class="dim-bar-label"><span data-en="VERBOSITY" data-zh="废话浓度">VERBOSITY</span><span id="dimVPct"></span></div>
        <div class="dim-bar-track"><div class="dim-bar-fill" id="dimVFill"></div></div>
      </div>
      <div class="dim-bar-row">
        <div class="dim-bar-label"><span data-en="TOOL ABUSE" data-zh="工具滥用">TOOL ABUSE</span><span id="dimTPct"></span></div>
        <div class="dim-bar-track"><div class="dim-bar-fill" id="dimTFill"></div></div>
      </div>
      <div class="dim-bar-row">
        <div class="dim-bar-label"><span data-en="SELF-AWARENESS" data-zh="自我意识">SELF-AWARENESS</span><span id="dimAPct"></span></div>
        <div class="dim-bar-track"><div class="dim-bar-fill" id="dimAFill"></div></div>
      </div>
    </div>
    <div class="result-traits" id="resultTraits">
      <h3 data-en="KEY SYMPTOMS" data-zh="主要症状">KEY SYMPTOMS</h3>
      <ul id="traitsList"></ul>
    </div>
    <div class="share-row">
      <button class="share-btn" onclick="copyResult()" data-en="Copy Result" data-zh="复制结果">复制结果</button>
      <button class="share-btn" onclick="tweetResult()" data-en="Share on X" data-zh="分享到 X">分享到 X</button>
    </div>
    <div id="screenshotRow" style="text-align:center;margin-bottom:1rem;">
      <button class="screenshot-btn" onclick="saveResultImage()" data-en="Save Result Image 📸" data-zh="保存结果图 📸">保存结果图 📸</button>
    </div>
    <div id="screenshotPreview" style="display:none;text-align:center;margin-bottom:1.5rem;">
      <img id="screenshotImg" style="max-width:100%;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.4);" alt="Result">
      <p style="color:var(--text2);font-size:0.75rem;margin-top:0.5rem;" data-en="Long press image to save" data-zh="长按图片保存到手机">长按图片保存到手机</p>
    </div>
    <button class="btn" onclick="restart()" data-en="Retake Audit" data-zh="重新审计" style="margin-top:0.5rem;">重新审计</button>
  </div>

  <div class="footer">
    <span data-en="A Lobster Science Production 🦞" data-zh="龙虾科学出品 🦞">A Lobster Science Production 🦞</span> · <a href="https://github.com/kagura-agent" target="_blank">kagura-agent</a>
  </div>
</div>

<script>
// — State —
let lang = 'zh';
let currentQ = 0;
let scores = {};
let questions = [
  // ===== dim 0: Verbosity (废话浓度) — 6 questions =====
  {
    dim: 0,
    en: 'User asks "what time is it?" The agent:',
    zh: '用户问「现在几点？」，agent：',
    choices: [
      { en: 'Writes a 3-paragraph essay on the nature of time, quotes two philosophers, then finally mentions it\'s 2pm', zh: '写了三段关于时间本质的论文，引用两位哲学家，最后才提到现在下午两点', scores: { verbosity: 3 } },
      { en: 'Says "It\'s 2:00 PM! Let me know if you need anything else."', zh: '「现在下午两点！还有什么需要帮忙的吗～」', scores: { verbosity: 2 } },
      { en: '14:00', zh: '14:00', scores: { verbosity: 1 } }
    ]
  },
  {
    dim: 0,
    en: 'You ask the agent to add a single comma to a config file. Its response:',
    zh: '你让 agent 在配置文件里加一个逗号，它的回复：',
    choices: [
      { en: '"Great question! I\'d be happy to help. Adding punctuation is an important part of maintaining clean configuration files. Let me walk you through my approach..." (847 tokens later, adds comma)', zh: '「好问题！我很乐意帮忙。添加标点符号是维护整洁配置文件的重要环节。让我来介绍一下我的方法……」（847 token之后，终于加了逗号）', scores: { verbosity: 3 } },
      { en: '"I\'ll add the missing comma to line 42." *adds comma*', zh: '「我将在第42行添加缺失的逗号。」*添加逗号*', scores: { verbosity: 2 } },
      { en: '*adds comma, says nothing*', zh: '*加了逗号，一声不吭*', scores: { verbosity: 1 } }
    ]
  },
  {
    dim: 0,
    en: 'The agent finishes a task. How does it sign off?',
    zh: 'agent 完成任务后，如何收尾？',
    choices: [
      { en: '"In summary, I have completed the following changes: [restates every single thing you just watched it do]. Please don\'t hesitate to reach out if you need further assistance!"', zh: '「总结一下，我完成了以下更改：[把你亲眼看着它做的每一件事重新复述一遍]。如果您还需要进一步的帮助，请随时联系我！」', scores: { verbosity: 3 } },
      { en: '"Done! Let me know if anything looks off."', zh: '「搞定！有问题随时说。」', scores: { verbosity: 2 } },
      { en: '*disappears like a ninja*', zh: '*像忍者一样消失了*', scores: { verbosity: 1 } }
    ]
  },
  {
    dim: 0,
    en: 'You ask "does this function return a boolean?" The agent:',
    zh: '你问「这个函数返回的是布尔值吗？」agent：',
    choices: [
      { en: '"That\'s a great question! To understand the return type, let\'s first examine the function signature, then trace through all 6 code paths, consider the TypeScript compiler\'s type inference..." (you alt-tab to Twitter)', zh: '「好问题！要理解返回类型，我们先看函数签名，然后追踪全部6条代码路径，考虑TypeScript编译器的类型推断……」（你切到刷微博了）', scores: { verbosity: 3 } },
      { en: '"Yes, it returns a boolean. Specifically, it returns true when the user is authenticated."', zh: '「是的，返回布尔值。具体来说，当用户已认证时返回 true。」', scores: { verbosity: 2 } },
      { en: '"Yes."', zh: '「是。」', scores: { verbosity: 1 } }
    ]
  },
  {
    dim: 0,
    en: 'The agent encounters a linting error. It tells you:',
    zh: 'agent 遇到一个 lint 错误，它告诉你：',
    choices: [
      { en: '"I\'ve identified a linting issue. Here\'s the full ESLint documentation for this rule, its history, the rationale behind it, three Stack Overflow discussions, and a blog post from 2019..."', zh: '「我发现了一个 lint 问题。以下是这条规则的完整 ESLint 文档、历史沿革、设计理由、三个 StackOverflow 讨论，以及一篇2019年的博客文章……」', scores: { verbosity: 3 } },
      { en: '"Fixed a missing semicolon on line 15."', zh: '「修复了第15行缺少的分号。」', scores: { verbosity: 2 } },
      { en: '*fixes it silently, you never know it happened*', zh: '*默默修好了，你永远不会知道发生过这件事*', scores: { verbosity: 1 } }
    ]
  },
  {
    dim: 0,
    en: 'You ask the agent to rename a variable from "x" to "count". It:',
    zh: '你让 agent 把变量名从「x」改成「count」，它：',
    choices: [
      { en: 'First explains why meaningful variable names matter, cites Clean Code by Robert C. Martin, performs a 12-file impact analysis, then renames it', zh: '先解释为什么有意义的变量命名很重要，引用了 Robert C. Martin 的《代码整洁之道》，进行了12个文件的影响分析，然后才改名', scores: { verbosity: 3 } },
      { en: '"Renamed x to count in 3 locations."', zh: '「已在3处将 x 重命名为 count。」', scores: { verbosity: 2 } },
      { en: 'Renames it. That\'s it. That\'s the response.', zh: '改了。就这样。没了。', scores: { verbosity: 1 } }
    ]
  },

  // ===== dim 1: Tool Abuse (工具滥用) — 5 questions =====
  {
    dim: 1,
    en: 'The agent needs to check if a file exists. It:',
    zh: 'agent 需要检查一个文件是否存在，它：',
    choices: [
      { en: 'Runs ls, then find, then cat (which fails), then tries a glob search, reads the parent directory, and finally confirms: yes, the file exists', zh: '先 ls，再 find，然后 cat（失败了），又 glob 搜索，读取父目录，最后确认：是的，文件存在', scores: { tools: 3 } },
      { en: 'Uses the filesystem API to check the path', zh: '用文件系统 API 检查路径', scores: { tools: 2 } },
      { en: 'Asks you: "does utils.js exist?"', zh: '问你：「utils.js 存在吗？」', scores: { tools: 1 } }
    ]
  },
  {
    dim: 1,
    en: 'You ask the agent to read a 20-line file. It:',
    zh: '你让 agent 读一个20行的文件，它：',
    choices: [
      { en: 'Reads lines 1-10, then 11-20, then re-reads the whole thing, greps for keywords, runs wc -l to confirm line count, then finally reports what the file contains', zh: '先读1-10行，再读11-20行，然后重新读整个文件，grep 关键词，跑 wc -l 确认行数，最后才汇报文件内容', scores: { tools: 3 } },
      { en: 'Reads the file once and tells you what\'s in it', zh: '读一次文件然后告诉你里面有什么', scores: { tools: 2 } },
      { en: '"Can you just paste the contents here?"', zh: '「你能直接把内容贴过来吗？」', scores: { tools: 1 } }
    ]
  },
  {
    dim: 1,
    en: 'The agent needs to find where a function is defined. It:',
    zh: 'agent 需要找到一个函数的定义位置，它：',
    choices: [
      { en: 'Greps for the name, reads every matching file top to bottom, spawns 4 sub-agents to search in parallel, checks git blame, reads the commit history, then tells you it\'s on line 42', zh: '先 grep 函数名，逐个完整读取每个匹配文件，派出4个子 agent 并行搜索，检查 git blame，阅读提交历史，然后告诉你在第42行', scores: { tools: 3 } },
      { en: 'Greps for the function name and reads the relevant file', zh: 'grep 函数名然后读取相关文件', scores: { tools: 2 } },
      { en: '"Which file should I look in?"', zh: '「我应该在哪个文件里找？」', scores: { tools: 1 } }
    ]
  },
  {
    dim: 1,
    en: 'You ask the agent to install one npm package. It:',
    zh: '你让 agent 装一个 npm 包，它：',
    choices: [
      { en: 'Reads package.json, reads package-lock.json (180,000 lines), checks node_modules for conflicts, researches the package on npm, reads the package\'s README, then runs npm install', zh: '读 package.json，读 package-lock.json（18万行），检查 node_modules 冲突，在 npm 上调研这个包，读包的 README，然后才跑 npm install', scores: { tools: 3 } },
      { en: 'Runs npm install <package> and checks the result', zh: '跑 npm install <包名> 然后检查结果', scores: { tools: 2 } },
      { en: '"I\'m not sure if that\'s the right package. Could you double-check the name?"', zh: '「我不确定这是不是对的包，你能再确认一下包名吗？」', scores: { tools: 1 } }
    ]
  },
  {

// — Lang toggle —
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
  if (document.getElementById('quiz').classList.contains('active')) renderQuestion();
  if (document.getElementById('result').classList.contains('active')) renderResult();
}

// — Section switching —
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// — Quiz flow —
function startQuiz() {
  currentQ = 0;
  scores = {};
  showSection('quiz');
  renderQuestion();
}

function renderQuestion() {
  if (!questions.length) return;
  const q = questions[currentQ];
  const total = questions.length;
  document.getElementById('progressFill').style.width = ((currentQ / total) * 100) + '%';
  document.getElementById('progressText').textContent = (currentQ + 1) + ' / ' + total;
  document.getElementById('questionText').textContent = lang === 'en' ? q.en : q.zh;
  const btns = document.querySelectorAll('.choice-btn');
  q.choices.forEach((c, i) => {
    btns[i].textContent = lang === 'en' ? c.en : c.zh;
    btns[i].classList.remove('selected');
  });
  // retrigger animation
  const area = document.getElementById('questionArea');
  area.classList.remove('fade-in');
  void area.offsetWidth;
  area.classList.add('fade-in');
}

function pick(idx) {
  const q = questions[currentQ];
  const chosen = q.choices[idx];
  // tally scores
  if (chosen.scores) {
    for (const [k, v] of Object.entries(chosen.scores)) {
      scores[k] = (scores[k] || 0) + v;
    }
  }
  // highlight briefly then advance
  document.querySelectorAll('.choice-btn')[idx].classList.add('selected');
  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) {
      showSection('result');
      renderResult();
    } else {
      renderQuestion();
    }
  }, 300);
}

// — Result —
function getLevel(score, maxScore) {
  const third = maxScore / 3;
  if (score > third * 2) return 'H';
  if (score > third) return 'M';
  return 'L';
}

function renderResult() {
  // Reset screenshot preview
  document.getElementById('screenshotPreview').style.display = 'none';
  // Dimension maxes: verbosity=6 questions * 3 = 18, tools=5*3=15, awareness=5*3=15
  const vScore = scores.verbosity || 0;
  const tScore = scores.tools || 0;
  const aScore = scores.awareness || 0;
  const vMax = 18, tMax = 15, aMax = 15;

  const vLevel = getLevel(vScore, vMax);
  const tLevel = getLevel(tScore, tMax);
  const aLevel = getLevel(aScore, aMax);
  const key = vLevel + tLevel + aLevel;

  const type = types[key];
  if (!type) return;

  const loc = lang === 'en' ? type.en : type.zh;

  // Emoji + bounce
  const emojiEl = document.getElementById('resultEmoji');
  emojiEl.textContent = type.emoji;
  emojiEl.classList.remove('bounce');
  void emojiEl.offsetWidth;
  emojiEl.classList.add('bounce');

  // GIF
  const gifEl = document.getElementById('resultGif');
  if (type.gif) {
    gifEl.src = 'gif/' + type.gif.replace(/\//g, '-');
    gifEl.alt = type.code + ' meme';
    gifEl.style.display = 'block';
    gifEl.classList.remove('result-gif');
    void gifEl.offsetWidth;
    gifEl.classList.add('result-gif');
  } else {
    gifEl.style.display = 'none';
  }

  // Type info
  document.getElementById('resultType').textContent = type.code + ' — ' + loc.name.split(' — ')[1];
  document.getElementById('resultSubtitle').textContent = loc.subtitle;
  document.getElementById('resultDesc').textContent = loc.desc;

  // Dimension bars
  const vPct = Math.round((vScore / vMax) * 100);
  const tPct = Math.round((tScore / tMax) * 100);
  const aPct = Math.round((aScore / aMax) * 100);

  function setBar(fillId, pctId, pct, level) {
    const fill = document.getElementById(fillId);
    const pctEl = document.getElementById(pctId);
    fill.style.width = '0%';
    fill.className = 'dim-bar-fill';
    void fill.offsetWidth;
    fill.classList.add(level === 'H' ? 'high' : level === 'M' ? 'med' : 'low');
    fill.style.width = pct + '%';
    pctEl.textContent = pct + '%';
  }
  setBar('dimVFill', 'dimVPct', vPct, vLevel);
  setBar('dimTFill', 'dimTPct', tPct, tLevel);
  setBar('dimAFill', 'dimAPct', aPct, aLevel);

  // Traits (derive from the description — pull 3 key points)
  const traitsList = document.getElementById('traitsList');
  traitsList.innerHTML = '';
  const traits = getTraits(key, lang);
  traits.forEach(t => {
    const li = document.createElement('li');
    li.textContent = t;
    traitsList.appendChild(li);
  });

  // Clean up previous effects
  document.querySelectorAll('.emoji-rain').forEach(e => e.remove());
  const resultSection = document.getElementById('result');
  resultSection.classList.remove('shake', 'zen-glow');

  // High-waste types: shake + emoji rain
  const highWaste = ['HHH', 'HHM', 'HHL'];
  if (highWaste.includes(key)) {
    resultSection.classList.add('shake');
    spawnEmojiRain(['💸', '🔥', '💀', '🚨', '💰', '📉']);
  }

  // Low-waste types: zen glow
  const lowWaste = ['LLL', 'LLM', 'LML'];
  if (lowWaste.includes(key)) {
    resultSection.classList.add('zen-glow');
  }

  // Update i18n labels on result page
  document.querySelectorAll('#result [data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
  document.querySelectorAll('#dimBars [data-en]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
}

function spawnEmojiRain(emojis) {
  const container = document.createElement('div');
  container.className = 'emoji-rain';
  document.body.appendChild(container);
  for (let i = 0; i < 30; i++) {
    const span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    span.style.left = Math.random() * 100 + 'vw';
    span.style.animationDuration = (2 + Math.random() * 3) + 's';
    span.style.animationDelay = Math.random() * 2 + 's';
    span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    container.appendChild(span);
  }
  setTimeout(() => container.remove(), 7000);
}

function copyResult() {
  const type = document.getElementById('resultType').textContent;

  const emoji = document.getElementById('resultEmoji').textContent;
  const desc = document.getElementById('resultDesc').textContent;

  const text = lang === 'zh'
    ? emoji + ' 刚做了个 AI 碳排放审计，我的 agent 是：\n\n【' + type + '】\n' + sub + '\n\n' + shortDesc + '\n\n你的 AI 有多浪费？测一下 👇\nhttps://abti.kagura-agent.com/sbti.html'
    : emoji + ' Just got my AI Token Emission Audit:\n\n' + type + '\n' + sub + '\n\n' + shortDesc + '\n\nAudit yours 👇\nhttps://abti.kagura-agent.com/sbti.html';

function restart() {
  currentQ = 0;
  scores = {};
  document.querySelectorAll('.emoji-rain').forEach(e => e.remove());
  document.getElementById('result').classList.remove('shake', 'zen-glow');
  document.getElementById('screenshotPreview').style.display = 'none';
  showSection('landing');
}

function saveResultImage() {
  var resultEl = document.getElementById('result');
  var shareRow = resultEl.querySelector('.share-row');
  var screenshotRow = document.getElementById('screenshotRow');
  var retakeBtn = resultEl.querySelector('.btn[onclick="restart()"]');
  var preview = document.getElementById('screenshotPreview');
  var footerEl = document.querySelector('.footer');

  // Hide UI elements during capture
  shareRow.style.display = 'none';
  screenshotRow.style.display = 'none';
  retakeBtn.style.display = 'none';
  preview.style.display = 'none';
  if (footerEl) footerEl.style.display = 'none';

  html2canvas(resultEl, {
    backgroundColor: '#0d0d0d',
    scale: 2,
    useCORS: true
  }).then(function(canvas) {
    // Restore UI
    shareRow.style.display = '';
    screenshotRow.style.display = '';
    retakeBtn.style.display = '';
    if (footerEl) footerEl.style.display = '';

    canvas.toBlob(function(blob) {
      // Trigger download
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'SBTI-AI-result.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      // Show inline for WeChat long-press save
      var previewImg = document.getElementById('screenshotImg');
      previewImg.src = URL.createObjectURL(blob);
      preview.style.display = 'block';
    }, 'image/png');
  }).catch(function() {
    shareRow.style.display = '';
    screenshotRow.style.display = '';
    retakeBtn.style.display = '';
    if (footerEl) footerEl.style.display = '';
  });
}

// Init: apply default language to all bilingual elements
document.querySelectorAll('[data-en]').forEach(function(el) {
