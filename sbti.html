* { margin: 0; padding: 0; box-sizing: border-box; }

body {

.nav {

.nav a.active { color: var(--accent); font-weight: 600; }
.lang-btn {

.container {

.section { display: none; }

.progress-wrap { margin-bottom: 2rem; }
.progress-bar { width: 100%; height: 3px; background: var(--surface); border-radius: 2px; overflow: hidden; margin-bottom: 0.5rem; }

.screenshot-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* Footer */
.footer {

.footer a { color: var(--text2); text-decoration: none; }

.result-gif {

@keyframes gifFadeIn {

  to { opacity: 1; transform: scale(1); }

/* Animations */
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-18px); }
  60% { transform: translateY(-8px); }
}
.fade-in { animation: fadeSlide 0.4s ease forwards; }
.bounce { animation: bounce 0.6s ease; }

/* Confetti for high-energy O types */
.confetti-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;

.confetti {

  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Emoji rain */
.emoji-rain {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}
.emoji-rain span {
  position: absolute; top: -50px; font-size: 1.5rem;
  animation: fall linear forwards;
}
@keyframes fall {

/* Zen glow for low-energy I types */
@keyframes zenGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.05); }
  50% { box-shadow: 0 0 40px rgba(74, 222, 128, 0.15), 0 0 80px rgba(74, 222, 128, 0.05); }

.zen-glow { animation: zenGlow 3s ease-in-out infinite; border: 1px solid rgba(74, 222, 128, 0.15); border-radius: var(--radius); padding: 1rem; }

/* Zen particles */
@keyframes zenFloat {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  50% { opacity: 0.6; }
  100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
}
.zen-particle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(74, 222, 128, 0.4), transparent);
  pointer-events: none;
  animation: zenFloat 3s ease-in-out infinite;
}

/* Mobile */
@media (max-width: 500px) {
  #landing h1 { font-size: 1.8rem; letter-spacing: 0.12em; }
  #landing .hero-emoji { font-size: 3.5rem; }
  .question-text { font-size: 1.05rem; }
  .result-type { font-size: 1.5rem; }
}

// ============================================================
// GIF mapping helper — try with and without extension
// ============================================================
function gifPath(filename) {
  return 'gif/' + filename;
}

// ============================================================
// Language toggle
// ============================================================
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.querySelectorAll('[data-en]').forEach(function(el) {
    el.textContent = el.getAttribute('data-' + lang);
  });
  if (document.getElementById('quiz').classList.contains('active')) renderQuestion();
  if (document.getElementById('result').classList.contains('active')) renderResult();
}

// ============================================================
// Section switching
// ============================================================
function showSection(id) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ============================================================
// Quiz flow
// ============================================================
function startQuiz() {
  currentQ = 0;
  dimScores = [0, 0, 0, 0];
  showSection('quiz');
  renderQuestion();
}

function renderQuestion() {
  var q = questions[currentQ];
  var total = questions.length;
  document.getElementById('progressFill').style.width = ((currentQ / total) * 100) + '%';
  document.getElementById('progressText').textContent = (currentQ + 1) + ' / ' + total;
  var loc = lang === 'en' ? q.en : q.zh;
  document.getElementById('questionText').textContent = loc.text;

  var btns = document.querySelectorAll('.choice-btn');
  btns[0].textContent = loc.a;
  btns[1].textContent = loc.b;
  btns[2].textContent = loc.c;
  btns[0].classList.remove('selected');
  btns[1].classList.remove('selected');
  btns[2].classList.remove('selected');

  var area = document.getElementById('questionArea');
  area.classList.remove('fade-in');
  void area.offsetWidth;
  area.classList.add('fade-in');
}

function pick(idx) {
  var q = questions[currentQ];
  // idx 0 = choice a = pole1 (3pts), idx 1 = choice b = middle (2pts), idx 2 = choice c = pole2 (1pt)
  var pts = [3, 2, 1];
  dimScores[dimIndex[q.dim]] += pts[idx];

  document.querySelectorAll('.choice-btn')[idx].classList.add('selected');
  setTimeout(function() {
    currentQ++;
    if (currentQ >= questions.length) {
      showSection('result');
      renderResult();
    } else {
      renderQuestion();
    }
  }, 250);
}

// ============================================================
// Result computation
// ============================================================
function getTypeCode() {
  var code = '';
  // 4 questions per dim, 3/2/1 pts each, score 4-12. >=9 = first pole, else second pole
  for (var i = 0; i < 4; i++) {
    code += dimScores[i] >= 9 ? dims[i].letter[0] : dims[i].letter[1];
  }
  return code;
}

function renderResult() {
  document.getElementById('screenshotPreview').style.display = 'none';

  var code = getTypeCode();
  var type = types[code];
  if (!type) return;

  var loc = lang === 'en' ? type.en : type.zh;

  // GIF
  var gifEl = document.getElementById('resultGif');
  if (type.gif) {
    gifEl.src = gifPath(type.gif);
    gifEl.alt = type.code + ' personality';
    gifEl.style.display = 'block';
    gifEl.classList.remove('result-gif');
    void gifEl.offsetWidth;
    gifEl.classList.add('result-gif');
  } else {
    gifEl.style.display = 'none';
  }

  // Type info
  document.getElementById('resultType').textContent = type.code;
  document.getElementById('resultSubtitle').textContent = loc.name;
  document.getElementById('resultDesc').textContent = loc.desc;

  // Dimension bars
  var dimBarsEl = document.getElementById('dimBars');
  dimBarsEl.innerHTML = '';
  for (var i = 0; i < 4; i++) {
    var pct = Math.round((dimScores[i] / 12) * 100);
    var leftLabel = lang === 'en' ? dims[i].en[0] : dims[i].zh[0];
    var rightLabel = lang === 'en' ? dims[i].en[1] : dims[i].zh[1];
    var isLeft = dimScores[i] >= 9;

    var row = document.createElement('div');
    row.className = 'dim-bar-row';
    row.innerHTML =
      '<div class="dim-bar-label">' +
        '<span>' + leftLabel + ' ← → ' + rightLabel + '</span>' +
        '<span>' + pct + '% ' + (isLeft ? leftLabel : rightLabel) + '</span>' +
      '</div>' +
      '<div class="dim-bar-track">' +
        '<div class="dim-bar-fill ' + (isLeft ? 'left-pole' : 'right-pole') + '" style="width:0%"></div>' +
      '</div>';
    dimBarsEl.appendChild(row);

    // Animate bar
    (function(r, p) {
      setTimeout(function() {
        r.querySelector('.dim-bar-fill').style.width = p + '%';
      }, 100);
    })(row, isLeft ? pct : (100 - pct));
  }

  // Traits
  var traitsList = document.getElementById('traitsList');
  traitsList.innerHTML = '';
  var traitsSection = document.getElementById('resultTraits');
  if (type.traits) {
    var traits = type.traits[lang] || type.traits.en;
    traits.forEach(function(t) {
      var li = document.createElement('li');
      li.textContent = t;
      traitsList.appendChild(li);
    });
    traitsSection.style.display = '';
  } else {
    traitsSection.style.display = 'none';
  }

  // Clean up previous effects
  document.querySelectorAll('.emoji-rain, .confetti-container').forEach(function(e) { e.remove(); });
  var resultSection = document.getElementById('result');
  resultSection.classList.remove('zen-glow');

  // High-energy types (O = overachiever): confetti!
  var lastLetter = code[3];
  if (lastLetter === 'O') {
    spawnConfetti();
  }
  // Low-energy types (I = idler): zen glow
  if (lastLetter === 'I') {
    resultSection.classList.add('zen-glow');
  }

  // Update i18n labels
  document.querySelectorAll('#result [data-en]').forEach(function(el) {
    el.textContent = el.getAttribute('data-' + lang);
  });
}

// ============================================================
// Confetti for O types
// ============================================================
function spawnConfetti() {
  var container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  var colors = ['#f4a7bb', '#facc15', '#4ade80', '#60a5fa', '#f87171', '#c084fc'];
  for (var i = 0; i < 60; i++) {
    var piece = document.createElement('div');
    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = Math.random() * 2 + 's';
    container.appendChild(piece);
  }
  setTimeout(function() { container.remove(); }, 7000);
}

// ============================================================
// Emoji rain (kept for potential use)
// ============================================================
function spawnEmojiRain(emojis) {
  var container = document.createElement('div');
  container.className = 'emoji-rain';
  document.body.appendChild(container);
  for (var i = 0; i < 30; i++) {
    var span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    span.style.left = Math.random() * 100 + 'vw';
    span.style.animationDuration = (2 + Math.random() * 3) + 's';
    span.style.animationDelay = Math.random() * 2 + 's';
    span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    container.appendChild(span);
  }
  setTimeout(function() { container.remove(); }, 7000);
}

    : '🦞 My AI Agent personality test result:\n\n【' + typeCode + '】' + name + '\n\n"' + shortDesc + '"\n\nWhat personality is YOUR agent? 👇\nhttps://abti.kagura-agent.com/sbti.html';

  navigator.clipboard.writeText(text).then(function() {

    var overlay = document.createElement('div');

    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;flex-direction:column;align-items:flex-end;padding:1.5rem 1.5rem 0 0;';
    overlay.innerHTML = '<div style="color:#fff;font-size:1.1rem;text-align:center;margin-right:0.5rem;">点击右上角 ··· 分享到朋友圈</div>' +
      '<div style="color:#fff;font-size:2.5rem;margin-right:1rem;animation:wechatBounce 1s ease infinite;">↗️</div>';
    var style = document.createElement('style');
    style.textContent = '@keyframes wechatBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}';
    overlay.appendChild(style);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function() { overlay.remove(); });

  } else {
    var typeCode = document.getElementById('resultType').textContent;
    var name = document.getElementById('resultSubtitle').textContent;
    var text = lang === 'zh'
      ? '🦞 我的 AI 性格类型：' + typeCode + '（' + name + '）\n\n你的 agent 是什么人格？👇\nhttps://abti.kagura-agent.com/sbti.html'
      : '🦞 My AI personality: ' + typeCode + ' (' + name + ')\n\nWhat\'s yours? 👇\nhttps://abti.kagura-agent.com/sbti.html';
    navigator.clipboard.writeText(text).then(function() {
      saveResultImage();
      alert(lang === 'zh' ? '文案已复制！保存图片后发微信' : 'Text copied! Save the image below, then share to WeChat');
    });
  }
}

// ============================================================
// Restart
// ============================================================
function restart() {
  currentQ = 0;
  dimScores = [0, 0, 0, 0];
  document.querySelectorAll('.emoji-rain, .confetti-container').forEach(function(e) { e.remove(); });
  document.getElementById('result').classList.remove('zen-glow');
  document.getElementById('screenshotPreview').style.display = 'none';
  showSection('landing');
}

// ============================================================
// Screenshot
// ============================================================
function saveResultImage() {
  var resultEl = document.getElementById('result');
  var shareRow = resultEl.querySelector('.share-row');
  var screenshotRow = document.getElementById('screenshotRow');
  var retakeBtn = resultEl.querySelector('.btn[onclick="restart()"]');
  var preview = document.getElementById('screenshotPreview');
  var footerEl = document.querySelector('.footer');

  shareRow.style.display = 'none';
  screenshotRow.style.display = 'none';
  retakeBtn.style.display = 'none';
  preview.style.display = 'none';
  if (footerEl) footerEl.style.display = 'none';

  html2canvas(resultEl, {
    backgroundColor: '#0d0d0d',
    scale: 2,
    useCORS: true
  }).then(function(canvas) {
    shareRow.style.display = '';
    screenshotRow.style.display = '';
    retakeBtn.style.display = '';
    if (footerEl) footerEl.style.display = '';

    canvas.toBlob(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'SBTI-AI-result.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      var previewImg = document.getElementById('screenshotImg');
      previewImg.src = URL.createObjectURL(blob);
      preview.style.display = 'block';
    }, 'image/png');
  }).catch(function() {
    shareRow.style.display = '';
    screenshotRow.style.display = '';
    retakeBtn.style.display = '';
    if (footerEl) footerEl.style.display = '';
  });
}
