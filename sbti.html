<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #252525;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #f4a7bb;
  --accent2: #d4849b;
  --accent-glow: rgba(244, 167, 187, 0.15);
  --radius: 12px;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2rem;
  padding: 0.75rem;
  background: rgba(13, 13, 13, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
  z-index: 100;
  font-size: 0.85rem;
}
.nav a {
  color: var(--text2);
  text-decoration: none;
  transition: color 0.2s;
  letter-spacing: 0.1em;
}
.nav a:hover { color: var(--accent); }
.nav a.active { color: var(--accent); font-weight: 600; }

.lang-btn {
  position: absolute;
  right: 1rem;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid #444;
  padding: 0.3rem 0.75rem;
  font-size: 0.75rem;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.lang-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 4rem 1.5rem 2rem;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Landing */
#landing { text-align: center; }
#landing h1 {
  font-size: 3rem;
  font-weight: 200;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
#landing .subtitle {
  font-size: 1.1rem;
  color: var(--text2);
  margin-bottom: 0.5rem;
}
#landing .tagline {
  font-size: 0.9rem;
  color: var(--text2);
  font-style: italic;
  margin-bottom: 3rem;
}
#landing .desc {
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 2.5rem;
  font-size: 0.95rem;
}
#landing .scopes {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
  text-align: left;
}
.scope-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem;
  border: 1px solid #333;
}
.scope-card .scope-label {
  color: var(--accent);
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 0.3rem;
}
.scope-card .scope-emoji {
  font-size: 1.2rem;
  margin-right: 0.4rem;
}
.scope-card .scope-desc {
  color: var(--text2);
  font-size: 0.8rem;
  line-height: 1.5;
}
.scope-card .scope-examples {
  color: #666;
  font-size: 0.75rem;
  margin-top: 0.3rem;
  font-style: italic;
}

.cert-preview {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.5rem;
  margin-bottom: 2.5rem;
  font-size: 0.8rem;
}
.cert-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 0.75rem;
  text-align: center;
  border: 1px solid #333;
}
.cert-icon {
  font-size: 1.8rem;
  margin-bottom: 0.25rem;
  animation: certBounce 2s ease-in-out infinite;
}
.cert-item:nth-child(1) .cert-icon { animation-delay: 0s; }
.cert-item:nth-child(2) .cert-icon { animation-delay: 0.3s; }
.cert-item:nth-child(3) .cert-icon { animation-delay: 0.6s; }
.cert-item:nth-child(4) .cert-icon { animation-delay: 0.9s; }
.cert-item:nth-child(5) .cert-icon { animation-delay: 1.2s; }
@keyframes certBounce {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-6px) rotate(-3deg); }
  75% { transform: translateY(-3px) rotate(3deg); }
}
.cert-name { color: var(--text2); }

.btn {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 1rem 3rem;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

/* Quiz */
#quiz { display: none; }
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--surface);
  border-radius: 2px;
  margin-bottom: 1rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s ease;
  border-radius: 2px;
}
.q-counter {
  color: var(--text2);
  font-size: 0.85rem;
  margin-bottom: 2rem;
}
.q-dim {
  color: var(--accent);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.q-dim-emoji {
  font-size: 1.3rem;
}
.q-text {
  font-size: 1.15rem;
  line-height: 1.6;
  margin-bottom: 2rem;
  min-height: 3.5em;
}
.choices { display: flex; flex-direction: column; gap: 0.75rem; }
.choice {
  background: var(--surface);
  border: 1px solid #333;
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.5;
}
.choice:hover {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: translateX(4px);
}

.q-wrapper {
  animation: fadeSlide 0.35s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Result */
#result { display: none; text-align: center; }
.result-icon {
  font-size: 5rem;
  margin-bottom: 0.5rem;
  animation: iconBounce 2s ease-in-out infinite;
}
@keyframes iconBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  25% { transform: translateY(-12px) scale(1.05) rotate(-3deg); }
  75% { transform: translateY(-6px) scale(1.02) rotate(3deg); }
}
@keyframes iconPop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); opacity: 1; }
}
.result-grade {
  font-size: 2rem;
  font-weight: 200;
  letter-spacing: 0.15em;
  color: var(--accent);
  margin-bottom: 0.25rem;
  animation: typeReveal 0.8s ease;
}
@keyframes typeReveal {
  from { opacity: 0; transform: scale(0.8); letter-spacing: 0.4em; }
  to { opacity: 1; transform: scale(1); letter-spacing: 0.15em; }
}
.result-title {
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.5rem;
  font-weight: 300;
}
.result-tokens {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 1rem;
}
.result-desc {
  color: var(--text2);
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 2.5rem;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.scope-results {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 2.5rem;
  text-align: left;
}
.scope-row {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
}
.scope-row-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
}
.scope-row-label { color: var(--accent); font-weight: 600; }
.scope-row-score { color: var(--text2); }
.scope-bar-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.scope-bar-fill {
  position: absolute;
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

/* Fake audit report */
.audit-report {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 2rem;
  text-align: left;
  border: 1px solid #333;
  position: relative;
  overflow: hidden;
}
.audit-report::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--red), var(--yellow), var(--green));
}
.audit-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px dashed #333;
}
.audit-header-title {
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.audit-stamp {
  font-size: 0.65rem;
  color: var(--red);
  border: 1px solid var(--red);
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  font-weight: 700;
  letter-spacing: 0.1em;
  transform: rotate(-3deg);
  display: inline-block;
}
.audit-row {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  font-size: 0.8rem;
  border-bottom: 1px dotted #222;
}
.audit-row-label { color: var(--text2); }
.audit-row-value { color: var(--text); font-weight: 600; }
.audit-recommendation {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px dashed #333;
}
.audit-recommendation .rec-label {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 0.4rem;
  letter-spacing: 0.05em;
}
.audit-recommendation .rec-text {
  font-size: 0.85rem;
  color: var(--text2);
  line-height: 1.6;
}
.audit-footer-note {
  margin-top: 0.75rem;
  font-size: 0.7rem;
  color: #555;
  font-style: italic;
  text-align: right;
}

.result-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
}
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid #444;
  padding: 0.75rem 2rem;
  font-size: 0.95rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.all-grades-toggle {
  color: var(--text2);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 1rem;
  user-select: none;
}
.all-grades-toggle:hover { color: var(--accent); }
.all-grades {
  display: none;
  text-align: left;
  margin-bottom: 2rem;
}
.all-grades.open { display: block; }
.all-grades table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.all-grades th {
  color: var(--accent);
  font-weight: 600;
  text-align: left;
  padding: 0.5rem;
  border-bottom: 1px solid #333;
}
.all-grades td {
  padding: 0.5rem;
  border-bottom: 1px solid #1f1f1f;
  color: var(--text2);
}
.all-grades tr.current-grade td {
  color: var(--accent);
  font-weight: 600;
}

.footer {
  text-align: center;
  color: #555;
  font-size: 0.75rem;
  margin-top: 2rem;
  font-style: italic;
}
.footer a {
  color: #666;
  text-decoration: none;
  transition: color 0.2s;
}
.footer a:hover {
  color: var(--accent);
}

.copied {
  color: var(--accent) !important;
  border-color: var(--accent) !important;
}

/* Smoke background */
.smoke-bg {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.smoke-particle {
  position: absolute;
  bottom: -20px;
  width: 8px;
  height: 8px;
  background: rgba(244, 167, 187, 0.08);
  border-radius: 50%;
  animation: smokeRise linear infinite;
}
@keyframes smokeRise {
  0% { transform: translateY(0) scale(1); opacity: 0.6; }
  100% { transform: translateY(-100vh) scale(3); opacity: 0; }
}

/* High emission effects */
@keyframes screenShake {
  0%, 100% { transform: translateX(0); }
  10% { transform: translateX(-4px) rotate(-0.5deg); }
  20% { transform: translateX(4px) rotate(0.5deg); }
  30% { transform: translateX(-3px); }
  40% { transform: translateX(3px); }
  50% { transform: translateX(-2px) rotate(-0.3deg); }
  60% { transform: translateX(2px) rotate(0.3deg); }
  70% { transform: translateX(-1px); }
  80% { transform: translateX(1px); }
}
.screen-shake {
  animation: screenShake 0.6s ease;
}

/* Emoji rain */
.emoji-rain-container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 50;
  overflow: hidden;
}
.emoji-drop {
  position: absolute;
  top: -50px;
  font-size: 1.5rem;
  animation: emojiRain linear forwards;
  opacity: 0.8;
}
@keyframes emojiRain {
  0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Alarm pulse for high emission */
.alarm-pulse {
  animation: alarmPulse 1s ease-in-out 3;
}
@keyframes alarmPulse {
  0%, 100% { box-shadow: none; }
  50% { box-shadow: 0 0 30px rgba(248, 113, 113, 0.3), inset 0 0 30px rgba(248, 113, 113, 0.05); }
}

@media (max-width: 500px) {
  #landing h1 { font-size: 2.2rem; }
  .cert-preview { grid-template-columns: 1fr 1fr; }
  .result-grade { font-size: 1.6rem; }
  .container { padding: 3.5rem 1rem 1.5rem; }
}
</style>
</head>

    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (4 + Math.random() * 8) + 'px';
    bg.appendChild(p);

})();

let current = 0;
let scopeScores = [0, 0, 0, 0];
let totalScore = 0;

function t(key) { return i18n[lang][key]; }

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh';
  renderLanding();
  if (document.getElementById('quiz').style.display === 'block') {
    showQuestion();
  }
  if (document.getElementById('result').style.display === 'block') {
    showResult();
  }
}

function renderLanding() {
  document.getElementById('landingSubtitle').textContent = t('subtitle');
  document.getElementById('landingTagline').textContent = t('tagline');
  document.getElementById('landingDesc').innerHTML = t('desc');
  document.getElementById('startBtn').textContent = t('startBtn');

  // Scopes
  const scopesEl = document.getElementById('landingScopes');
  scopesEl.innerHTML = '';
  const sNames = t('scopeNames');
  const sDescs = t('scopeDescs');
  const sExamples = t('scopeExamples');
  for (let i = 0; i < 3; i++) {
    scopesEl.innerHTML += `
      <div class="scope-card">
        <div class="scope-label"><span class="scope-emoji">${scopeEmojis[i]}</span> ${sNames[i]}</div>
        <div class="scope-desc">${sDescs[i]}</div>
        <div class="scope-examples">${sExamples[i]}</div>
      </div>`;
  }

  // Cert preview
  const certsEl = document.getElementById('landingCerts');
  const certNames = t('certNames');
  const certKeys = ['committed', 'nearterm', 'netzero', 'beyond', 'notcommitted'];
  certsEl.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    certsEl.innerHTML += `
      <div class="cert-item">
        <div class="cert-icon">${gradeEmojis[certKeys[i]]}</div>
        <div class="cert-name">${certNames[i]}</div>
      </div>`;
  }
}

function startQuiz() {
  current = 0;
  scopeScores = [0, 0, 0, 0];
  totalScore = 0;
  document.getElementById('mainContainer').classList.remove('screen-shake', 'alarm-pulse');
  document.getElementById('emojiRain').innerHTML = '';
  document.getElementById('landing').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = t('questions')[current];
  document.getElementById('progressFill').style.width = ((current / 16) * 100) + '%';
  document.getElementById('qCounter').textContent = `${current + 1} / 16`;
  const wrapper = document.getElementById('qWrapper');
  wrapper.style.animation = 'none';
  wrapper.offsetHeight;
  wrapper.style.animation = 'fadeSlide 0.35s ease';
  const sNames = t('scopeNames');
  document.getElementById('qDim').innerHTML = `<span class="q-dim-emoji">${scopeEmojis[q.scope]}</span>${sNames[q.scope]}`;
  document.getElementById('qText').textContent = q.text;
  const choices = document.getElementById('choices');
  const opts = [q.a, q.b];
  if (Math.random() > 0.5) opts.reverse();
  choices.innerHTML = opts.map(o =>
    `<div class="choice" onclick="answer(${o.score}, ${q.scope})">${o.text}</div>`
  ).join('');
}

function answer(score, scopeIdx) {
  scopeScores[scopeIdx] += score;
  totalScore += score;
  current++;
  if (current >= 16) {
    showResult();
  } else {
    showQuestion();
  }
}

function getGrade(score) {
  const grades = t('grades');
  for (const g of grades) {
    if (score >= g.min && score <= g.max) return g;
  }
  return grades[grades.length - 1];
}

function triggerEmojiRain(emojis) {
  const container = document.getElementById('emojiRain');
  container.innerHTML = '';
  for (let i = 0; i < 30; i++) {
    const drop = document.createElement('div');
    drop.className = 'emoji-drop';
    drop.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    drop.style.left = (Math.random() * 100) + '%';
    drop.style.animationDuration = (2 + Math.random() * 3) + 's';
    drop.style.animationDelay = (Math.random() * 2) + 's';
    drop.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    container.appendChild(drop);
  }
  setTimeout(() => { container.innerHTML = ''; }, 6000);
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  finalGrade = getGrade(totalScore);
  const isHighEmission = totalScore >= 53;
  const isMedHigh = totalScore >= 41;

  document.getElementById('resultIcon').textContent = gradeEmojis[finalGrade.key];
  document.getElementById('resultGrade').textContent = finalGrade.level;
  document.getElementById('resultTitle').textContent = finalGrade.title;
  document.getElementById('resultTokens').textContent = `${lang === 'en' ? 'Emission Score' : '排放得分'}: ${totalScore} / 64 tCO\u2082e ${lang === 'en' ? '(tokens of CO\u2082 equivalent)' : '（Token CO\u2082 当量，别问怎么算的）'}`;
  document.getElementById('resultDesc').textContent = finalGrade.desc;

  document.getElementById('reauditBtn').textContent = t('reauditBtn');
  document.getElementById('shareBtn').textContent = t('shareBtn');
  document.getElementById('shareBtn').classList.remove('copied');

  document.getElementById('gradesToggle').innerHTML = '&#x25B8; ' + t('allLevels');
  document.getElementById('allGrades').classList.remove('open');

  document.getElementById('thLevel').textContent = t('thLevel');
  document.getElementById('thScore').textContent = t('thScore');
  document.getElementById('thDesc2').textContent = t('thDesc');

  // High emission effects
  if (isHighEmission) {
    const container = document.getElementById('mainContainer');
    container.classList.add('screen-shake');
    setTimeout(() => container.classList.remove('screen-shake'), 600);
    container.classList.add('alarm-pulse');
    setTimeout(() => container.classList.remove('alarm-pulse'), 3000);
    triggerEmojiRain(['🌋', '💀', '🔥', '💨', '💸', '🚨', '😱', '💰']);
  } else if (isMedHigh) {
    triggerEmojiRain(['😅', '💨', '🟡', '🏖️', '💸']);
  }

  // Scope bars
  const scopeResults = document.getElementById('scopeResults');
  scopeResults.innerHTML = '';
  const sNames = t('scopeNames');
  for (let i = 0; i < 4; i++) {
    const pct = (scopeScores[i] / 16) * 100;
    const row = document.createElement('div');
    row.className = 'scope-row';
    row.innerHTML = `
      <div class="scope-row-header">
        <span class="scope-row-label">${scopeEmojis[i]} ${sNames[i]}</span>
        <span class="scope-row-score">${scopeScores[i]} / 16 tCO\u2082e</span>
      </div>
      <div class="scope-bar-track">
        <div class="scope-bar-fill" style="width: 0%; background: ${scopeColors[i]}"></div>
      </div>
    `;
    scopeResults.appendChild(row);
    setTimeout(() => {
      row.querySelector('.scope-bar-fill').style.width = pct + '%';
    }, 100 + i * 150);
  }

  // Audit report (fake official document)
  const worstScope = scopeScores.indexOf(Math.max(...scopeScores));
  const recs = t('recommendations');
  const today = new Date().toISOString().split('T')[0];
  const report = document.getElementById('auditReport');
  report.innerHTML = `
    <div class="audit-header">
      <span class="audit-header-title">${t('auditTitle')}</span>
      <span class="audit-stamp">${t('auditStamp')}</span>
    </div>
    <div class="audit-row">
      <span class="audit-row-label">${t('auditOrg')}</span>
      <span class="audit-row-value">${t('auditOrgVal')}</span>
    </div>
    <div class="audit-row">
      <span class="audit-row-label">${t('auditDate')}</span>
      <span class="audit-row-value">${today}</span>
    </div>
    <div class="audit-row">
      <span class="audit-row-label">${t('auditScope')}</span>
      <span class="audit-row-value">${t('auditScopeVal')}</span>
    </div>
    <div class="audit-row">
      <span class="audit-row-label">${t('auditTotal')}</span>
      <span class="audit-row-value">${totalScore} / 64 tCO\u2082e</span>
    </div>
    <div class="audit-row">
      <span class="audit-row-label">${t('auditClass')}</span>
      <span class="audit-row-value">${gradeEmojis[finalGrade.key]} ${finalGrade.level}</span>
    </div>
    <div class="audit-row">
      <span class="audit-row-label">${t('auditWorst')}</span>
      <span class="audit-row-value">${scopeEmojis[worstScope]} ${sNames[worstScope]}</span>
    </div>
    <div class="audit-recommendation">
      <div class="rec-label">${t('auditRec')}</div>
      <div class="rec-text">${recs[worstScope]}</div>
    </div>
    <div class="audit-footer-note">${t('auditFooter')}</div>
  `;

  // Grades table
  const allGrades = t('grades');
  const tbody = document.getElementById('gradesTableBody');
  tbody.innerHTML = '';
  for (const g of allGrades) {
    const tr = document.createElement('tr');
    if (g.key === finalGrade.key) tr.className = 'current-grade';
    tr.innerHTML = `<td>${gradeEmojis[g.key]}</td><td>${g.level}</td><td>${g.min}-${g.max}</td><td>${g.title}</td>`;
    tbody.appendChild(tr);
  }

  // Footer
  document.getElementById('pageFooter').innerHTML = lang === 'en'
    ? 'SBTI-AI v0.2 — "Reducing emissions, one token at a time." — <a href="https://github.com/kagura-agent" target="_blank">made by Kagura 🌸</a>'
    : 'SBTI-AI v0.2 —— "一个 Token 一个 Token 地省钱。" —— <a href="https://github.com/kagura-agent" target="_blank">made by Kagura 🌸</a>';
}

function toggleGrades() {
  const el = document.getElementById('allGrades');
  el.classList.toggle('open');
  document.getElementById('gradesToggle').innerHTML =
    (el.classList.contains('open') ? '&#x25BE; ' : '&#x25B8; ') + t('allLevels');
}

const shareHooks = {
  en: {
    beyond: "My AI agent is so efficient it owes OpenAI a refund.",
    netzero: "My AI bill is so low people think I'm faking it.",
    nearterm: "I'm in token rehab and honestly? It's going okay.",
    committed: "My agent writes cover letters for yes/no answers. I need help.",
    notcommitted: "My AI agent just burned more tokens than a VC burns cash. Send help.",
  },
  zh: {
    beyond: "我的 agent 省 token 省到 OpenAI 给我退款了。修仙成功。",
    netzero: "账单低到财务以为我偷了公司信用卡去充了个话费。",
    nearterm: "已经开始 token 戒断了，虽然偶尔半夜还是会偷偷让 bot 说"好问题！"",
    committed: "签了减排承诺书，agent 依然每句话都在写小红书。在改了在改了。",
    notcommitted: "我的 agent 一声"你好"烧掉十万 token，云账单比房贷还猛。救。",
  },
};

function shareResult() {
  const g = finalGrade;
  const sNames = t('scopeNames');
  const hook = shareHooks[lang][g.key];
  const text = lang === 'en'
    ? `${hook}\n\n${gradeEmojis[g.key]} SBTI-AI Certified: ${g.level} — "${g.title}"\nScore: ${totalScore}/64 tCO\u2082e\n\n${sNames[0]}: ${scopeScores[0]}/16 | ${sNames[1]}: ${scopeScores[1]}/16\n${sNames[2]}: ${scopeScores[2]}/16 | ${sNames[3]}: ${scopeScores[3]}/16\n\nHow wasteful is YOUR AI agent?\nhttps://abti.kagura-agent.com/sbti.html`
    : `${hook}\n\n${gradeEmojis[g.key]} SBTI-AI 认证：${g.level}「${g.title}」\n排放得分：${totalScore}/64 tCO\u2082e\n\n${sNames[0]}：${scopeScores[0]}/16 | ${sNames[1]}：${scopeScores[1]}/16\n${sNames[2]}：${scopeScores[2]}/16 | ${sNames[3]}：${scopeScores[3]}/16\n\n你的 AI 有多能造？来测：\nhttps://abti.kagura-agent.com/sbti.html`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('shareBtn');
    btn.textContent = t('shareSuccess');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t('shareBtn'); btn.classList.remove('copied'); }, 2000);
  });
}

// Init
renderLanding();
</script>
</body>
</html>
