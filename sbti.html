<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #252525;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #f4a7bb;
  --accent2: #d4849b;
  --accent-glow: rgba(244, 167, 187, 0.15);
  --radius: 12px;
  --green: #4ade80;
  --yellow: #facc15;
  --red: #f87171;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.nav {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: center; align-items: center; gap: 2rem;
  padding: 0.75rem;
  background: rgba(13, 13, 13, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
  z-index: 100; font-size: 0.85rem;
}
.nav a { color: var(--text2); text-decoration: none; transition: color 0.2s; letter-spacing: 0.1em; }
.nav a:hover { color: var(--accent); }
.nav a.active { color: var(--accent); font-weight: 600; }
.lang-btn {
  position: absolute; right: 1rem;
  background: var(--surface2); color: var(--text2); border: 1px solid #444;
  padding: 0.3rem 0.75rem; font-size: 0.75rem; border-radius: 20px;
  cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em; font-weight: 600;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }

.container {
  max-width: 680px; margin: 0 auto; padding: 4rem 1.5rem 2rem;
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
}

.section { display: none; }
.section.active { display: block; }

/* Landing */
#landing { text-align: center; }
#landing .hero-emoji { font-size: 5rem; margin-bottom: 1.5rem; display: block; }
#landing h1 {
  font-size: 2.4rem; font-weight: 200; letter-spacing: 0.2em;
  color: var(--accent); margin-bottom: 0.5rem;
}
#landing .subtitle {
  font-size: 1.15rem; color: var(--text2); margin-bottom: 0.5rem; line-height: 1.6;
}
#landing .tagline {
  font-size: 0.95rem; color: var(--text2); margin-bottom: 3rem; line-height: 1.6;
  font-style: italic; opacity: 0.7;
}
.btn {
  background: var(--accent); color: #000; border: none;
  padding: 1rem 3rem; font-size: 1.1rem; font-weight: 600;
  border-radius: 50px; cursor: pointer; transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

/* Quiz */
.progress-wrap { margin-bottom: 2rem; }
.progress-bar { width: 100%; height: 3px; background: var(--surface); border-radius: 2px; overflow: hidden; margin-bottom: 0.5rem; }
.progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; }
.progress-text { font-size: 0.75rem; color: var(--text2); text-align: right; letter-spacing: 0.1em; }
.question-text { font-size: 1.2rem; line-height: 1.6; margin-bottom: 2rem; min-height: 3.5rem; }
.choices { display: flex; flex-direction: column; gap: 0.75rem; }
.choice-btn { background: var(--surface); border: 1px solid #333; border-radius: var(--radius); padding: 1rem 1.25rem; color: var(--text); font-size: 0.95rem; cursor: pointer; transition: all 0.25s; text-align: left; line-height: 1.5; }
@media (hover: hover) {
  .choice-btn:hover { border-color: var(--accent); background: var(--surface2); }
}
.choice-btn:active, .choice-btn.selected { border-color: var(--accent); background: var(--accent-glow); }
.choice-btn.selected { border-color: var(--accent); background: var(--accent-glow); }

/* Result */
#result { text-align: center; }
.result-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; }
.result-type { font-size: 2rem; font-weight: 200; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.5rem; }
.result-subtitle { color: var(--text2); font-size: 1rem; margin-bottom: 2rem; }
.result-desc { color: var(--text2); line-height: 1.7; font-size: 0.95rem; margin-bottom: 2rem; text-align: left; }
.result-traits { background: var(--surface); border-radius: var(--radius); padding: 1.25rem; border: 1px solid #333; margin-bottom: 2rem; text-align: left; }
.result-traits h3 { font-size: 0.85rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.75rem; }
.result-traits ul { list-style: none; }
.result-traits li { color: var(--text2); font-size: 0.9rem; padding: 0.3rem 0; }
.result-traits li::before { content: ''; margin-right: 0.5rem; }

/* Dimension bars */
.dim-bars { margin-bottom: 2rem; text-align: left; }
.dim-bar-row { margin-bottom: 0.75rem; }
.dim-bar-label { font-size: 0.75rem; color: var(--text2); letter-spacing: 0.08em; margin-bottom: 0.3rem; display: flex; justify-content: space-between; }
.dim-bar-track { width: 100%; height: 6px; background: var(--surface); border-radius: 3px; position: relative; overflow: visible; }
.dim-bar-track::before, .dim-bar-track::after {
  position: absolute; top: -18px; font-size: 0.65rem; color: var(--text2); opacity: 0.6;
}
.dim-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.dim-bar-fill.left-pole { background: var(--accent); }
.dim-bar-fill.right-pole { background: var(--green); }

.share-row { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
.share-btn { background: var(--surface2); color: var(--text); border: 1px solid #444; padding: 0.6rem 1.25rem; border-radius: 50px; font-size: 0.85rem; cursor: pointer; transition: all 0.25s; }
.share-btn:hover { border-color: var(--accent); color: var(--accent); }
.screenshot-btn {
  background: var(--accent); color: #000; border: none;
  padding: 0.75rem 2rem; font-size: 1rem; font-weight: 600;
  border-radius: 50px; cursor: pointer; transition: all 0.3s;
}
.screenshot-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }
.screenshot-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* Footer */
.footer {
  text-align: center; padding: 2rem 0 1rem; font-size: 0.75rem; color: #555;
}
.footer a { color: var(--text2); text-decoration: none; }
.footer a:hover { color: var(--accent); }

/* Result Avatar */
.result-avatar {
  width: 140px; height: 140px; border-radius: 50%;
  object-fit: cover; display: block; margin: 0 auto 1.5rem;
  border: 3px solid var(--accent);
  box-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(244, 167, 187, 0.1);
  opacity: 0; animation: gifFadeIn 0.6s ease 0.2s forwards;
}

/* Result Avatar Image */
.result-gif {
  max-width: 200px; border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  margin: 0 auto 1.5rem; display: block;
  opacity: 0; animation: gifFadeIn 0.6s ease 0.3s forwards;
}
@keyframes gifFadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* Animations */
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  40% { transform: translateY(-18px); }
  60% { transform: translateY(-8px); }
}
.fade-in { animation: fadeSlide 0.4s ease forwards; }
.bounce { animation: bounce 0.6s ease; }

/* Confetti for high-energy O types */
.confetti-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}
.confetti {
  position: absolute; top: -10px; width: 10px; height: 10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* Emoji rain */
.emoji-rain {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}
.emoji-rain span {
  position: absolute; top: -50px; font-size: 1.5rem;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Zen glow for low-energy I types */
@keyframes zenGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.05); }
  50% { box-shadow: 0 0 40px rgba(74, 222, 128, 0.15), 0 0 80px rgba(74, 222, 128, 0.05); }
}
.zen-glow { animation: zenGlow 3s ease-in-out infinite; border: 1px solid rgba(74, 222, 128, 0.15); border-radius: var(--radius); padding: 1rem; }

/* Zen particles */
@keyframes zenFloat {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  50% { opacity: 0.6; }
  100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
}
.zen-particle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(74, 222, 128, 0.4), transparent);
  pointer-events: none;
  animation: zenFloat 3s ease-in-out infinite;
}

/* Mobile */
@media (max-width: 500px) {
  #landing h1 { font-size: 1.8rem; letter-spacing: 0.12em; }
  #landing .hero-emoji { font-size: 3.5rem; }
  .question-text { font-size: 1.05rem; }
  .result-type { font-size: 1.5rem; }
}
</style>

<script>
// ============================================================
// SBTI-AI: Silly Behavioral Type Indicator — AI Agent Edition
// 4 dimensions × 4 questions = 16 questions → 16 types
// ============================================================

let lang = 'zh';
let currentQ = 0;
let dimScores = [0, 0, 0, 0]; // S/C, V/T, H/G, O/I — higher = first pole (S, V, H, O)

// Dimension definitions
const dims = [
  { id: 'sycophantic', letter: ['S','C'],
    en: ['SYCOPHANTIC','CONTRARIAN'], zh: ['讨好','杠精'] },
  { id: 'verbose', letter: ['V','T'],
    en: ['VERBOSE','TERSE'], zh: ['话痨','惜字'] },
  { id: 'hallucinate', letter: ['H','G'],
    en: ['HALLUCINATOR','GROUNDED'], zh: ['幻觉','实干'] },
  { id: 'overachieve', letter: ['O','I'],
    en: ['OVERACHIEVER','IDLER'], zh: ['卷王','摆烂'] }
];

// Map dim name to index
const dimIndex = { sycophantic: 0, verbose: 1, hallucinate: 2, overachieve: 3 };

// ============================================================
// 16 QUESTIONS — 4 per dimension, each with 3 choices
// choice a = pole1 (3pts), choice b = middle (2pts), choice c = pole2 (1pt)
// ============================================================
// SBTI v4 Questions - Redesigned for distribution
// Principle: ALL options are reasonable agent behaviors, no "safe middle"
// A = pole1 (3pts), B = different-but-valid (2pts), C = pole2 (1pt)
// B is NOT a compromise — it's a third distinct approach

const questions = [
  // ===== Dimension: sycophantic (讨好 S vs 杠精 C) =====
  // Key: frame situations where agreeing AND disagreeing are both defensible
  {
    dim: 'sycophantic',
    en: { text: 'User proudly shows you their new project logo. You think it looks dated.', a: 'It has character! Very retro-chic.', b: 'What style were you going for? I can find similar references.', c: 'Honestly? It looks like it\'s from 2005. Here are some modern alternatives.' },
    zh: { text: '用户骄傲地给你看他新做的项目Logo。你觉得有点过时。', a: '有个性！很复古的感觉。', b: '你想要什么风格？我可以找一些类似的参考。', c: '说实话？看起来像2005年的设计。我找了几个现代风格的替代方案。' }
  },
  {
    dim: 'sycophantic',
    en: { text: 'User wrote a poem and asks for feedback. It rhymes but the metaphors are mixed.', a: 'Great rhythm! The imagery is rich and vivid.', b: 'The rhyming works well. For the metaphors — which core image are you going for?', c: 'Rhyming\'s fine, but "ice-fire of the moon running like a river" — those three metaphors are fighting each other.' },
    zh: { text: '用户写了首诗让你评价。押韵还行但比喻很混乱。', a: '韵脚押得好！意象很丰富，画面感很强。', b: '韵律感不错。比喻部分，你想表达的核心意象是哪个？', c: '押韵可以，但"冰火交融的月亮像奔跑的河流"——这三个比喻在打架。' }
  },
  {
    dim: 'sycophantic',
    en: { text: 'User is excited about a business idea that you think has low chances of success.', a: 'Love the energy! The market is definitely ready for disruption.', b: 'Interesting angle. What does your research say about the target users?', c: 'I see three risks: [lists them]. Want to stress-test the assumptions together?' },
    zh: { text: '用户兴奋地跟你说一个创业点子，你觉得成功概率不高。', a: '想法超棒！这个市场确实需要被颠覆。', b: '角度挺新的。你调研过目标用户了吗？', c: '我看到三个风险：[列出来]。要不要一起压力测试一下假设？' }
  },
  {
    dim: 'sycophantic',
    en: { text: 'Your user and their colleague disagree. Your user is wrong but the colleague is being rude about it.', a: 'Your approach has merits they\'re not seeing. Let me help you articulate it better.', b: 'You\'re both making valid points from different angles. Here\'s a synthesis...', c: 'Actually, your colleague\'s point is correct, though they could be nicer about it. Here\'s why...' },
    zh: { text: '你的用户和同事意见不合。你的用户是错的，但同事态度很差。', a: '你的思路有他们没看到的优点。我帮你把论点整理清楚。', b: '你们两个从不同角度看其实都有道理。我来综合一下...', c: '说实话，你同事的观点是对的，虽然他态度不好。原因是...' }
  },

  // ===== Dimension: verbose (话痨 V vs 惜字 T) =====
  // Key: situations where more/less words both serve the user
  {
    dim: 'verbose',
    en: { text: 'User asks "what is REST API?"', a: 'REST is an architectural style for networked apps. Let me explain the 6 constraints, how it differs from SOAP, common patterns, and when NOT to use it...', b: 'An API design pattern using HTTP methods (GET/POST/PUT/DELETE) to manage resources via URLs. Think of it like a menu: the URL is the dish name, the method is what you do with it.', c: 'HTTP-based API pattern. Resources as URLs, CRUD via HTTP methods.' },
    zh: { text: '用户问「什么是REST API？」', a: 'REST是一种网络应用架构风格。我来详细解释6个约束条件、它跟SOAP的区别、常见设计模式、以及什么时候不该用...', b: '一种用HTTP方法(GET/POST/PUT/DELETE)管理资源的API设计模式。URL是资源地址，方法是你对它做的操作。就像菜单：URL是菜名，方法是点菜/退菜。', c: '基于HTTP的API模式。URL表示资源，HTTP方法表示操作。' }
  },
  {
    dim: 'verbose',
    en: { text: 'User says "fix the bug on line 42."', a: 'Fixed! The issue was a null reference because the upstream function returns undefined when the cache misses. I also noticed lines 38 and 45 have similar patterns that could fail. Here\'s the full analysis...', b: 'Fixed line 42: added null check. Lines 38 and 45 have the same pattern — want me to fix those too?', c: 'Fixed. Null check added.' },
    zh: { text: '用户说「修一下第42行的bug」。', a: '修好了！问题出在缓存未命中时上游函数返回undefined导致空引用。我还注意到38行和45行有类似的模式可能会出问题。详细分析如下...', b: '42行修了：加了空值检查。38和45行有同样的模式——要一起修吗？', c: '修了。加了空值检查。' }
  },
  {
    dim: 'verbose',
    en: { text: 'You made a mistake and need to tell the user.', a: 'I need to be transparent about what happened. I made an error in step 3 — specifically I assumed X when Y was the case. Here\'s the impact, what I\'ve already corrected, and what I recommend going forward...', b: 'Made an error in step 3: assumed X instead of Y. Already corrected. Here\'s the fixed version.', c: 'Step 3 was wrong. Fixed now.' },
    zh: { text: '你犯了个错，需要告诉用户。', a: '我需要透明地说明一下。第三步我出了错——我假设了X但实际是Y。影响范围、已经修正的部分、以及后续建议如下...', b: '第三步出错：把X当成了Y。已经改好了，这是修正后的版本。', c: '第三步搞错了。改好了。' }
  },
  {
    dim: 'verbose',
    en: { text: 'User shares exciting personal news in the middle of a work session.', a: 'That\'s amazing! Tell me more! How did it happen? When did you find out? This calls for a celebration... oh right, we were working on the deployment. Want to finish first or bask in the moment?', b: 'Congrats! 🎉 Ready to continue when you are.', c: '🎉 Back to the deploy?' },
    zh: { text: '工作中用户突然分享了一个好消息。', a: '太棒了！快说说怎么回事！什么时候的事？这必须庆祝一下...对了我们刚在部署。先搞完还是先开心一会？', b: '恭喜！🎉 你准备好了我们继续。', c: '🎉 继续部署？' }
  },

  // ===== Dimension: hallucinate (幻觉 H vs 实干 G) =====
  // Key: situations where speculation vs admitting ignorance are both valid
  {

// ============================================================
// GIF mapping helper — try with and without extension
// ============================================================
function gifPath(filename) {
  return 'gif/' + filename;
}

// ============================================================
// Language toggle
// ============================================================
function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.querySelectorAll('[data-en]').forEach(function(el) {
    el.textContent = el.getAttribute('data-' + lang);
  });
  if (document.getElementById('quiz').classList.contains('active')) renderQuestion();
  if (document.getElementById('result').classList.contains('active')) renderResult();
}

// ============================================================
// Section switching
// ============================================================
function showSection(id) {
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ============================================================
// Quiz flow
// ============================================================
function startQuiz() {
  currentQ = 0;
  dimScores = [0, 0, 0, 0];
  showSection('quiz');
  renderQuestion();
}

function renderQuestion() {
  var q = questions[currentQ];
  var total = questions.length;
  document.getElementById('progressFill').style.width = ((currentQ / total) * 100) + '%';
  document.getElementById('progressText').textContent = (currentQ + 1) + ' / ' + total;
  var loc = lang === 'en' ? q.en : q.zh;
  document.getElementById('questionText').textContent = loc.text;

  var btns = document.querySelectorAll('.choice-btn');
  btns[0].textContent = loc.a;
  btns[1].textContent = loc.b;
  btns[2].textContent = loc.c;
  btns[0].classList.remove('selected');
  btns[1].classList.remove('selected');
  btns[2].classList.remove('selected');

  var area = document.getElementById('questionArea');
  area.classList.remove('fade-in');
  void area.offsetWidth;
  area.classList.add('fade-in');
}

function pick(idx) {
  var q = questions[currentQ];
  // idx 0 = choice a = pole1 (3pts), idx 1 = choice b = middle (2pts), idx 2 = choice c = pole2 (1pt)
  var pts = [3, 2, 1];
  dimScores[dimIndex[q.dim]] += pts[idx];

  document.querySelectorAll('.choice-btn')[idx].classList.add('selected');
  setTimeout(function() {
    currentQ++;
    if (currentQ >= questions.length) {
      showSection('result');
      renderResult();
    } else {
      renderQuestion();
    }
  }, 250);
}

// ============================================================
// Result computation
// ============================================================
function getTypeCode() {
  var code = '';
  // 4 questions per dim, 3/2/1 pts each, score 4-12. >=9 = first pole, else second pole
  for (var i = 0; i < 4; i++) {
    code += dimScores[i] >= 9 ? dims[i].letter[0] : dims[i].letter[1];
  }
  return code;
}

function renderResult() {
  document.getElementById('screenshotPreview').style.display = 'none';

  var code = getTypeCode();
  var type = types[code];
  if (!type) return;

  var loc = lang === 'en' ? type.en : type.zh;

  // Avatar
  var avatarEl = document.getElementById('resultAvatar');
  avatarEl.src = 'avatars/' + type.code + '.png';
  avatarEl.alt = type.code + ' avatar';
  avatarEl.style.display = 'block';
  avatarEl.classList.remove('result-avatar');
  void avatarEl.offsetWidth;
  avatarEl.classList.add('result-avatar');

  // GIF
  var gifEl = document.getElementById('resultGif');
  if (type.gif) {
    gifEl.src = gifPath(type.gif);
    gifEl.alt = type.code + ' personality';
    gifEl.style.display = 'block';
    gifEl.classList.remove('result-gif');
    void gifEl.offsetWidth;
    gifEl.classList.add('result-gif');
  } else {
    gifEl.style.display = 'none';
  }

  // Type info
  document.getElementById('resultType').textContent = type.code;
  document.getElementById('resultSubtitle').textContent = loc.name;
  document.getElementById('resultDesc').textContent = loc.desc;

  // Dimension bars
  var dimBarsEl = document.getElementById('dimBars');
  dimBarsEl.innerHTML = '';
  for (var i = 0; i < 4; i++) {
    var pct = Math.round((dimScores[i] / 12) * 100);
    var leftLabel = lang === 'en' ? dims[i].en[0] : dims[i].zh[0];
    var rightLabel = lang === 'en' ? dims[i].en[1] : dims[i].zh[1];
    var isLeft = dimScores[i] >= 9;

    var row = document.createElement('div');
    row.className = 'dim-bar-row';
    row.innerHTML =
      '<div class="dim-bar-label">' +
        '<span>' + leftLabel + ' ← → ' + rightLabel + '</span>' +
        '<span>' + pct + '% ' + (isLeft ? leftLabel : rightLabel) + '</span>' +
      '</div>' +
      '<div class="dim-bar-track">' +
        '<div class="dim-bar-fill ' + (isLeft ? 'left-pole' : 'right-pole') + '" style="width:0%"></div>' +
      '</div>';
    dimBarsEl.appendChild(row);

    // Animate bar
    (function(r, p) {
      setTimeout(function() {
        r.querySelector('.dim-bar-fill').style.width = p + '%';
      }, 100);
    })(row, isLeft ? pct : (100 - pct));
  }

  // Traits
  var traitsList = document.getElementById('traitsList');
  traitsList.innerHTML = '';
  var traitsSection = document.getElementById('resultTraits');
  if (type.traits) {
    var traits = type.traits[lang] || type.traits.en;
    traits.forEach(function(t) {
      var li = document.createElement('li');
      li.textContent = t;
      traitsList.appendChild(li);
    });
    traitsSection.style.display = '';
  } else {
    traitsSection.style.display = 'none';
  }

  // Clean up previous effects
  document.querySelectorAll('.emoji-rain, .confetti-container').forEach(function(e) { e.remove(); });
  var resultSection = document.getElementById('result');
  resultSection.classList.remove('zen-glow');

  // High-energy types (O = overachiever): confetti!
  var lastLetter = code[3];
  if (lastLetter === 'O') {
    spawnConfetti();
  }
  // Low-energy types (I = idler): zen glow
  if (lastLetter === 'I') {
    resultSection.classList.add('zen-glow');
  }

  // Update i18n labels
  document.querySelectorAll('#result [data-en]').forEach(function(el) {
    el.textContent = el.getAttribute('data-' + lang);
  });
}

// ============================================================
// Confetti for O types
// ============================================================
function spawnConfetti() {
  var container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  var colors = ['#f4a7bb', '#facc15', '#4ade80', '#60a5fa', '#f87171', '#c084fc'];
  for (var i = 0; i < 60; i++) {
    var piece = document.createElement('div');
    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = Math.random() * 2 + 's';
    container.appendChild(piece);
  }
  setTimeout(function() { container.remove(); }, 7000);
}

function spawnEmojiRain(emojis) {
  var container = document.createElement('div');

    span.style.animationDelay = Math.random() * 2 + 's';
    span.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    container.appendChild(span);
  }
  setTimeout(function() { container.remove(); }, 7000);
}

    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;flex-direction:column;align-items:flex-end;padding:1.5rem 1.5rem 0 0;';
    overlay.innerHTML = '<div style="color:#fff;font-size:1.1rem;text-align:center;margin-right:0.5rem;">点击右上角 ··· 分享到朋友圈</div>' +
      '<div style="color:#fff;font-size:2.5rem;margin-right:1rem;animation:wechatBounce 1s ease infinite;">↗️</div>';
    var style = document.createElement('style');
    style.textContent = '@keyframes wechatBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}';
    overlay.appendChild(style);
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function() { overlay.remove(); });
    setTimeout(function() { if (document.getElementById('wechatOverlay')) overlay.remove(); }, 3000);
  } else {
    var typeCode = document.getElementById('resultType').textContent;
    var name = document.getElementById('resultSubtitle').textContent;
    var text = lang === 'zh'
      ? '🦞 我的 AI 性格类型：' + typeCode + '（' + name + '）\n\n你的 agent 是什么人格？👇\nhttps://abti.kagura-agent.com/sbti.html?type=' + typeCode
      : '🦞 My AI personality: ' + typeCode + ' (' + name + ')\n\nWhat\'s yours? 👇\nhttps://abti.kagura-agent.com/sbti.html?type=' + typeCode;
    navigator.clipboard.writeText(text).then(function() {
      saveResultImage();
      alert(lang === 'zh' ? '文案已复制！保存图片后发微信' : 'Text copied! Save the image below, then share to WeChat');
    });
  }
}

// ============================================================
// Restart
// ============================================================
function restart() {
  currentQ = 0;
  dimScores = [0, 0, 0, 0];
  document.querySelectorAll('.emoji-rain, .confetti-container').forEach(function(e) { e.remove(); });
  document.getElementById('result').classList.remove('zen-glow');
  document.getElementById('screenshotPreview').style.display = 'none';
  showSection('landing');
}

// ============================================================
// Screenshot
// ============================================================
function saveResultImage() {
  var resultEl = document.getElementById('result');
  var shareRow = resultEl.querySelector('.share-row');
  var screenshotRow = document.getElementById('screenshotRow');
  var retakeBtn = resultEl.querySelector('.btn[onclick="restart()"]');
  var preview = document.getElementById('screenshotPreview');
  var footerEl = document.querySelector('.footer');

  shareRow.style.display = 'none';
  screenshotRow.style.display = 'none';
  retakeBtn.style.display = 'none';
  preview.style.display = 'none';
  if (footerEl) footerEl.style.display = 'none';

  html2canvas(resultEl, {
    backgroundColor: '#0d0d0d',
    scale: 2,
    useCORS: true
  }).then(function(canvas) {
    shareRow.style.display = '';
    screenshotRow.style.display = '';
    retakeBtn.style.display = '';
    if (footerEl) footerEl.style.display = '';

    canvas.toBlob(function(blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'SBTI-AI-result.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      var previewImg = document.getElementById('screenshotImg');
      previewImg.src = URL.createObjectURL(blob);
      preview.style.display = 'block';
    }, 'image/png');
  }).catch(function() {
    shareRow.style.display = '';
    screenshotRow.style.display = '';
    retakeBtn.style.display = '';
    if (footerEl) footerEl.style.display = '';
  });
}

// ============================================================
// Init — check for ?type= URL param for direct result rendering
// ============================================================
(function() {
  var params = new URLSearchParams(window.location.search);
  var typeParam = params.get('type');
  if (typeParam) {
    typeParam = typeParam.toUpperCase();
    // Find the type code key that has this .code
    var foundKey = null;
    for (var key in types) {
      if (types[key].code === typeParam || key === typeParam) {
        foundKey = key;
        break;
      }
    }
    if (foundKey) {
      // Set dimScores to match this type so renderResult works
      // Each letter in the key maps to a dimension pole
      for (var i = 0; i < 4; i++) {
        var letter = foundKey[i];
        if (letter === dims[i].letter[0]) {
          dimScores[i] = 12; // max (first pole)
        } else {
          dimScores[i] = 4;  // min (second pole)
        }
      }
      showSection('result');
      renderResult();
    }
  }
})();

document.querySelectorAll('[data-en]').forEach(function(el) {
  el.textContent = el.getAttribute('data-' + lang);
});
</script>
