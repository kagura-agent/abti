<style>
:root {
  --bg: #faf9f7;
  --surface: #ffffff;
  --surface2: #f0eeeb;
  --text: #1a1a1a;
  --text2: #6b6b6b;
  --accent: #e8658a;
  --accent2: #d44d73;
  --accent-soft: #fdf0f3;
  --accent-glow: rgba(232, 101, 138, 0.10);
  --border: #e8e5e1;
  --radius: 14px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2rem;
  padding: 0.75rem;
  background: rgba(250, 249, 247, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  font-size: 0.85rem;
}
.nav a {
  color: var(--text2);
  text-decoration: none;
  transition: color 0.2s;
  letter-spacing: 0.1em;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.nav a:hover { color: var(--accent); }
.nav a.active { color: var(--accent); font-weight: 600; }

.lang-btn {
  position: absolute;
  right: 1rem;
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border);
  padding: 0.3rem 0.75rem;
  font-size: 0.75rem;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  box-shadow: var(--shadow-sm);
}
.lang-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: var(--shadow-md);
}

body {
  font-family: 'DM Sans', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 4rem 1.5rem 2rem;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Landing */
#landing { text-align: center; }
#landing h1 {
  font-size: 3.2rem;
  font-weight: 200;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-bottom: 0.5rem;
  font-family: 'DM Sans', sans-serif;
}
#landing .subtitle {
  font-size: 1.1rem;
  color: var(--text2);
  margin-bottom: 0.5rem;
  font-weight: 400;
}
#landing .tagline {
  font-size: 0.9rem;
  color: var(--text2);
  font-style: italic;
  margin-bottom: 3rem;
}
#landing .desc {
  color: var(--text2);
  line-height: 1.8;
  margin-bottom: 2.5rem;
  font-size: 0.95rem;
}
#landing .dims {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
  text-align: left;
}
.dim-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, transform 0.2s;
}
.dim-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.dim-card .dim-label {
  color: var(--accent);
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 0.3rem;
}
.dim-card .dim-pair {
  color: var(--text2);
  font-size: 0.8rem;
}
.dim-card .dim-emoji {
  font-size: 1.2rem;
  margin-right: 0.3rem;
}

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 1rem 3rem;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
  box-shadow: 0 4px 16px rgba(232, 101, 138, 0.25);
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(232, 101, 138, 0.35);
  background: var(--accent2);
}

/* Quiz */
#quiz { display: none; }
.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin-bottom: 1rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #f4a7bb);
  transition: width 0.4s ease;
  border-radius: 2px;
}
.q-counter {
  color: var(--text2);
  font-size: 0.85rem;
  margin-bottom: 2rem;
  font-weight: 500;
}
.q-dim {
  color: var(--accent);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.q-dim-emoji {
  font-size: 1.3rem;
}
.q-text {
  font-size: 1.15rem;
  line-height: 1.7;
  margin-bottom: 2rem;
  min-height: 3.5em;
  color: var(--text);
}
.choices { display: flex; flex-direction: column; gap: 0.75rem; }
.choice {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.6;
  box-shadow: var(--shadow-sm);
}
@media (hover: hover) {
  .choice:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    transform: translateX(4px);
    box-shadow: var(--shadow-md);
  }
}
.choice:active {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.choice.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
  transform: translateX(4px);
  box-shadow: var(--shadow-md);
}

.q-wrapper {
  animation: fadeSlide 0.35s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Result */
#result { display: none; text-align: center; }

.result-emoji {
  font-size: 5rem;
  margin-bottom: 0.5rem;
  animation: emojiBounce 2s ease-in-out infinite;
}
@keyframes emojiBounce {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-8px) rotate(-3deg); }
  75% { transform: translateY(-4px) rotate(3deg); }
}

.result-type {
  font-size: 4rem;
  font-weight: 200;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 0.25rem;
  animation: typeReveal 0.8s ease;
  font-family: 'DM Sans', sans-serif;
}
@keyframes typeReveal {
  from { opacity: 0; transform: scale(0.8); letter-spacing: 0.6em; }
  to { opacity: 1; transform: scale(1); letter-spacing: 0.2em; }
}
.result-nick {
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.5rem;
  font-weight: 400;
}
.result-desc {
  color: var(--text2);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 2.5rem;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.dim-results {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 2.5rem;
  text-align: left;
}
.dim-row {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.dim-row-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
}
.dim-row-left { color: var(--text2); }
.dim-row-right { color: var(--text2); }
.dim-row-active { color: var(--accent); font-weight: 600; }
.dim-bar-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.dim-bar-fill {
  position: absolute;
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #f4a7bb);
  border-radius: 3px;
  transition: width 0.6s ease;
}
.dim-balanced {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 0.35rem;
  font-style: italic;
}

.famous-agents {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 2rem;
  text-align: left;
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  box-shadow: var(--shadow-sm);
}
.famous-agents h3 {
  font-size: 0.85rem;
  color: var(--accent);
  margin-bottom: 0.75rem;
  font-weight: 600;
}
.famous-agents p {
  color: var(--text2);
  font-size: 0.9rem;
  line-height: 1.6;
}

.result-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
}
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 0.75rem 2rem;
  font-size: 0.95rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: var(--shadow-md);
}

.btn-card {
  background: var(--surface);
  color: #7c6bc4;
  border: 1px solid #d4cef0;
  padding: 0.75rem 2rem;
  font-size: 0.95rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: "DM Sans", sans-serif;
  box-shadow: var(--shadow-sm);
}
.btn-card:hover {
  border-color: #7c6bc4;
  color: #5a4ba0;
  box-shadow: var(--shadow-md);
}

/* Type table */
.type-table-toggle {
  color: var(--text2);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 1rem;
  user-select: none;
  font-weight: 500;
}
.type-table-toggle:hover { color: var(--accent); }
.type-table {
  display: none;
  text-align: left;
  margin-bottom: 2rem;
}
.type-table.open { display: block; }
.type-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.type-table th {
  color: var(--accent);
  font-weight: 600;
  text-align: left;
  padding: 0.5rem;
  border-bottom: 2px solid var(--border);
}
.type-table td {
  padding: 0.5rem;
  border-bottom: 1px solid var(--surface2);
  color: var(--text2);
}
.type-table .type-emoji-cell {
  font-size: 1.1rem;
}
.type-table tr.current-type td {
  color: var(--accent);
  font-weight: 600;
}

/* Research References */
.research-toggle {
  color: var(--text2);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 1rem;
  user-select: none;
  font-weight: 500;
}
.research-toggle:hover { color: var(--accent); }
.research-refs {
  display: none;
  text-align: left;
  margin-bottom: 2rem;
}
.research-refs.open { display: block; }
.ref-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 0.6rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.ref-title {
  color: var(--accent);
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 0.25rem;
}
.ref-year {
  color: var(--text2);
  font-size: 0.75rem;
  font-weight: 500;
  margin-bottom: 0.3rem;
}
.ref-note {
  color: var(--text2);
  font-size: 0.82rem;
  line-height: 1.5;
  font-style: italic;
}

.profile {
  text-align: left;
  margin-bottom: 2rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  animation: fadeSlide 0.5s ease;
}
.profile-section {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.profile-section h3 {
  font-size: 0.85rem;
  color: var(--accent);
  margin-bottom: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.profile-section ul {
  list-style: none;
  padding: 0;
}
.profile-section li {
  color: var(--text2);
  font-size: 0.9rem;
  line-height: 1.7;
  padding: 0.25rem 0;
  padding-left: 1.1rem;
  position: relative;
}
.profile-section li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.65rem;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
}
.profile-section .work-style {
  color: var(--text2);
  font-size: 0.9rem;
  line-height: 1.7;
}
.profile-section .pair-type {
  color: var(--accent);
  font-weight: 600;
  font-size: 0.85rem;
}
.profile-section .pair-reason {
  color: var(--text2);
  font-size: 0.88rem;
  line-height: 1.6;
}

.footer {
  text-align: center;
  color: #b0aca6;
  font-size: 0.75rem;
  margin-top: 2rem;
  font-style: italic;
}

.copied {
  color: var(--accent) !important;
  border-color: var(--accent) !important;
}

@media (max-width: 500px) {
  #landing h1 { font-size: 2.2rem; }
  #landing .dims { grid-template-columns: 1fr; }
  .result-type { font-size: 3rem; }
  .result-emoji { font-size: 4rem; }
  .container { padding: 3.5rem 1rem 1.5rem; }
}
</style>
</head>

<div class="container">
  <!-- Landing -->
  <div id="landing">
    <h1>ABTI</h1>
    <div class="subtitle" id="landingSubtitle"></div>
    <div class="tagline" id="landingTagline"></div>

  <div id="quiz">

  <!-- Result -->
  <div id="result">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-type" id="resultType"></div>
    <div class="result-nick" id="resultNick"></div>
    <div class="result-desc" id="resultDesc"></div>

    <div class="research-refs" id="researchRefs"></div>

    <div class="result-actions">
      <button class="btn" id="retakeBtn" onclick="startQuiz()"></button>
      <button class="btn-secondary" id="shareBtn" onclick="shareResult()"></button>

    <div class="footer">ABTI v0.1 — Designed by Kagura 🌸</div>
  </div>
</div>

let current = 0;
let scores = [0, 0, 0, 0];
let cachedType = null;

function t(key) { return i18n[lang][key]; }

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh';
  renderLanding();
  // If quiz is visible, re-render current question
  if (document.getElementById('quiz').style.display === 'block') {
    showQuestion();
  }
  // If result is visible, re-render
  if (document.getElementById('result').style.display === 'block') {
    showResult();
  }
}

function renderLanding() {
  document.getElementById('landingSubtitle').textContent = t('subtitle');
  document.getElementById('landingTagline').textContent = t('tagline');
  document.getElementById('landingDesc').innerHTML = t('desc');
  document.getElementById('startBtn').textContent = t('startBtn');

  const dimsEl = document.getElementById('landingDims');
  dimsEl.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    dimsEl.innerHTML += `
      <div class="dim-card">
        <div class="dim-label"><span class="dim-emoji">${dimEmojis[i]}</span>${t('dimNames')[i]}</div>
        <div class="dim-pair">${t('dimPairs')[i]}</div>
      </div>`;
  }
}

function startQuiz() {
  current = 0;
  scores = [0, 0, 0, 0];
  cachedType = null;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = t('questions')[current];
  document.getElementById('progressFill').style.width = ((current / 16) * 100) + '%';
  document.getElementById('qCounter').textContent = `${current + 1} / 16`;
  const wrapper = document.getElementById('qWrapper');
  wrapper.style.animation = 'none';
  wrapper.offsetHeight;
  wrapper.style.animation = 'fadeSlide 0.35s ease';
  document.getElementById('qDim').innerHTML = `<span class="q-dim-emoji">${dimEmojis[q.dimIdx]}</span>${q.dim}`;
  document.getElementById('qText').textContent = q.text;
  const choices = document.getElementById('choices');
  choices.innerHTML = `
    <div class="choice" onclick="answer(true, this)">${q.a}</div>
    <div class="choice" onclick="answer(false, this)">${q.b}</div>
  `;
}

function answer(isA, el) {
  if (el) el.classList.add('selected');
  if (isA) scores[t('questions')[current].dimIdx]++;
  current++;
  setTimeout(() => {
    if (current >= 16) {
      showResult();
    } else {
      showQuestion();
    }
  }, 250);
}

function getType() {
  if (cachedType) return cachedType;
  let code = '';
  for (let i = 0; i < 4; i++) {
    if (scores[i] >= 3) code += dimLetters[i][0];
    else if (scores[i] <= 1) code += dimLetters[i][1];
    else code += dimLetters[i][Math.round(Math.random())]; // tie: random to remove bias
  }
  cachedType = code;
  return code;
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const code = getType();
  const info = t('types')[code] || { nick: '???', desc: 'A unique combination!' };

  document.getElementById('resultEmoji').textContent = typeEmojis[code] || '🤖';
  document.getElementById('resultType').textContent = code;
  document.getElementById('resultNick').textContent = info.nick;
  document.getElementById('resultDesc').textContent = info.desc;

  // Buttons
  document.getElementById('retakeBtn').textContent = t('retakeBtn');
  document.getElementById('shareBtn').textContent = t('shareBtn');
  document.getElementById('shareBtn').classList.remove('copied');
  document.getElementById('copyLinkBtn').textContent = t('copyLink');
  document.getElementById('copyLinkBtn').classList.remove('copied');
  document.getElementById('downloadCardBtn').textContent = t('downloadCard');

  // Table toggle
  document.getElementById('typeTableToggle').textContent = '▸ ' + t('allTypes');

  // Table headers
  document.getElementById('thType').textContent = t('thType');
  document.getElementById('thNick').textContent = t('thNick');
  document.getElementById('thDesc').textContent = t('thDesc');

  // Dimension bars
  const dimResults = document.getElementById('dimResults');
  dimResults.innerHTML = '';
  const labels = t('dimLabels');
  for (let i = 0; i < 4; i++) {
    const pct = (scores[i] / 4) * 100;
    const leftActive = scores[i] >= 3;
    const rightActive = scores[i] <= 1;
    const isBalanced = scores[i] === 2;
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="dim-row-header">
        <span class="dim-row-left ${leftActive ? 'dim-row-active' : ''}">${labels[i][0]} (${dimLetters[i][0]})</span>
        <span class="dim-row-right ${rightActive ? 'dim-row-active' : ''}">${labels[i][1]} (${dimLetters[i][1]})</span>
      </div>
      <div class="dim-bar-track">
        <div class="dim-bar-fill" style="width: 0%"></div>
      </div>
      ${isBalanced ? `<div class="dim-balanced">${t('balanced')}</div>` : ''}
    `;
    dimResults.appendChild(row);
    setTimeout(() => {
      row.querySelector('.dim-bar-fill').style.width = pct + '%';
    }, 100 + i * 150);
  }

  // Famous agents
  const fa = document.getElementById('famousAgents');
  const agents = famousMap[code];
  if (agents && agents.length) {
    fa.style.display = 'block';
    fa.innerHTML = `<h3>${t('famousTitle')}</h3><p>${agents.join(' · ')}</p>`;
  } else {
    fa.innerHTML = `<h3>${t('famousTitle')}</h3><p>${t('famousPioneer')(code)}</p>`;
  }

  // Type table
  const allTypes = t('types');
  const tbody = document.getElementById('typeTableBody');
  tbody.innerHTML = '';
  for (const [tp, tInfo] of Object.entries(allTypes)) {
    const tr = document.createElement('tr');
    if (tp === code) tr.className = 'current-type';
    tr.innerHTML = `<td>${tp}</td><td class="type-emoji-cell">${typeEmojis[tp] || ''}</td><td>${tInfo.nick}</td><td>${tInfo.desc}</td>`;
    tbody.appendChild(tr);
  }

  // Research references
  document.getElementById('researchToggle').textContent = '\u25b8 ' + t('researchTitle');
  const refsEl = document.getElementById('researchRefs');
  refsEl.classList.remove('open');
  refsEl.innerHTML = '';
  const refs = t('researchRefs');
  for (const ref of refs) {
    refsEl.innerHTML += `
      <div class="ref-item">
        <div class="ref-title">${ref.title}</div>
        <div class="ref-year">${ref.year}</div>
        <div class="ref-note">${ref.note}</div>
      </div>`;
  }

  // Fetch and display rich profile
  const profileEl = document.getElementById('profile');
  profileEl.innerHTML = '';
  const apiLang = lang === 'zh' ? 'zh' : 'en';
  fetch('/api/types?lang=' + apiLang)
    .then(r => r.json())
    .then(data => {
      const typeData = data.types && data.types[code];
      if (!typeData) return;
      const pl = t('profLabels');
      let html = '';
      if (typeData.strengths && typeData.strengths.length) {
        html += `<div class="profile-section"><h3>${pl.strengths}</h3><ul>${typeData.strengths.map(s => '<li>' + s + '</li>').join('')}</ul></div>`;
      }
      if (typeData.blindSpots && typeData.blindSpots.length) {
        html += `<div class="profile-section"><h3>${pl.blindSpots}</h3><ul>${typeData.blindSpots.map(s => '<li>' + s + '</li>').join('')}</ul></div>`;
      }
      if (typeData.workStyle) {
        html += `<div class="profile-section"><h3>${pl.workStyle}</h3><div class="work-style">${typeData.workStyle}</div></div>`;
      }
      if (typeData.bestPairedWith && typeData.bestPairedWith.length) {
        const pairHtml = typeData.bestPairedWith.map(p => {
          const pInfo = t('types')[p.type];
          return `<li><span class="pair-type">${p.type} "${pInfo ? pInfo.nick : '?'}"</span> — <span class="pair-reason">${p.reason}</span></li>`;
        }).join('');
        html += `<div class="profile-section"><h3>${pl.bestPairedWith}</h3><ul>${pairHtml}</ul></div>`;
      }
      profileEl.innerHTML = html;
    })
    .catch(() => {});
}

function toggleTable() {
  const el = document.getElementById('typeTable');
  el.classList.toggle('open');
  document.getElementById('typeTableToggle').textContent =
    (el.classList.contains('open') ? '▾ ' : '▸ ') + t('allTypes');
}

function toggleResearch() {
  const el = document.getElementById('researchRefs');
  el.classList.toggle('open');
  document.getElementById('researchToggle').textContent =
    (el.classList.contains('open') ? '▾ ' : '▸ ') + t('researchTitle');
}

function shareResult() {
  const code = getType();
  const info = t('types')[code] || { nick: '???' };
  const labels = t('dimLabels');
  const dimNames = t('dimNames');
  const text = `My ABTI type: ${code} "${info.nick}" ${typeEmojis[code] || ''} \u{1F338}\n\n${dimNames[0]}: ${scores[0]}/4 ${labels[0][scores[0]>=3?0:1]}\n${dimNames[1]}: ${scores[1]}/4 ${labels[1][scores[1]>=3?0:1]}\n${dimNames[2]}: ${scores[2]}/4 ${labels[2][scores[2]>=3?0:1]}\n${dimNames[3]}: ${scores[3]}/4 ${labels[3][scores[3]>=3?0:1]}\n\nTake the test: https://abti.kagura-agent.com`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('shareBtn');
    btn.textContent = t('shareSuccess');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t('shareBtn'); btn.classList.remove('copied'); }, 2000);
  });
}

function copyLink() {
  const code = getType();
  const url = `https://abti.kagura-agent.com/result/${code}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyLinkBtn');
    btn.textContent = t('copyLinkSuccess');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t('copyLink'); btn.classList.remove('copied'); }, 2000);
  });
}

function downloadCard() {
  const code = getType();
  const info = t("types")[code] || { nick: "???", desc: "" };
  const emoji = typeEmojis[code] || "🤖";
  const labels = t("dimLabels");
  const W = 600, H = 800;
  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, "#fdf0f3");
  bg.addColorStop(0.5, "#fce4ec");
  bg.addColorStop(1, "#f8e8ef");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Decorative circles
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = "#e8658a";
  ctx.beginPath(); ctx.arc(480, 120, 180, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(100, 650, 140, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // Header
  ctx.fillStyle = "#b0848f";
  ctx.font = "500 14px \"DM Sans\", sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("ABTI — Agent Behavioral Type Indicator", W / 2, 50);

  // Emoji
  ctx.font = "72px serif";
  ctx.fillText(emoji, W / 2, 140);

  // Type code
  ctx.fillStyle = "#e8658a";
  ctx.font = "200 64px \"DM Sans\", sans-serif";
  ctx.letterSpacing = "8px";
  ctx.fillText(code, W / 2, 220);
  ctx.letterSpacing = "0px";

  // Nickname
  ctx.fillStyle = "#1a1a1a";
  ctx.font = "500 24px \"DM Sans\", \"Noto Serif SC\", sans-serif";
  ctx.fillText(info.nick, W / 2, 265);

  // Divider
  ctx.strokeStyle = "rgba(232, 101, 138, 0.3)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(150, 290); ctx.lineTo(450, 290); ctx.stroke();

  // Dimension bars
  const barX = 80, barW = 440, barH = 14, startY = 325;
  for (let i = 0; i < 4; i++) {
    const y = startY + i * 80;
    const pct = scores[i] / 4;
    ctx.fillStyle = "#6b6b6b";
    ctx.font = "500 13px \"DM Sans\", \"Noto Serif SC\", sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(labels[i][0] + " (" + dimLetters[i][0] + ")", barX, y - 20);
    ctx.textAlign = "right";
    ctx.fillText(labels[i][1] + " (" + dimLetters[i][1] + ")", barX + barW, y - 20);
    ctx.fillStyle = "rgba(232, 101, 138, 0.12)";
    ctx.beginPath(); ctx.roundRect(barX, y, barW, barH, 7); ctx.fill();
    const fillGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    fillGrad.addColorStop(0, "#e8658a");
    fillGrad.addColorStop(1, "#f4a7bb");
    ctx.fillStyle = fillGrad;
    ctx.beginPath(); ctx.roundRect(barX, y, barW * pct, barH, 7); ctx.fill();
    ctx.fillStyle = "#e8658a";
    ctx.font = "600 13px \"DM Sans\", sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(scores[i] + "/4", barX + barW * pct, y + barH + 18);
  }

  // Watermark
  ctx.fillStyle = "#c4a0aa";
  ctx.font = "500 14px \"DM Sans\", sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("abti.kagura-agent.com", W / 2, H - 50);

  // Footer
  ctx.fillStyle = "#b0848f";
  ctx.font = "italic 12px \"DM Sans\", sans-serif";
  ctx.fillText("Designed by Kagura \u{1F338}", W / 2, H - 28);

  // Download
  const link = document.createElement("a");
  link.download = "abti-" + code + ".png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// Init — detect /result/:type URL
const resultUrlMatch = window.location.pathname.match(/^\/result\/([A-Z]{4})$/i);
if (resultUrlMatch) {
  const typeCode = resultUrlMatch[1].toUpperCase();
  const VALID_TYPES = ['PTCF','PTCN','PTDF','PTDN','PECF','PECN','PEDF','PEDN','RTCF','RTCN','RTDF','RTDN','RECF','RECN','REDF','REDN'];
  if (VALID_TYPES.includes(typeCode)) {
    // Simulate scores: P=4/R=0, T=4/E=0, C=4/D=0, F=4/N=0
    const letterToScore = { P: [4,0], R: [0,0], T: [0,4], E: [0,0], C: [0,0,4], D: [0,0,0], F: [0,0,0,4], N: [0,0,0,0] };
    // Dim 0: P→4, R→0; Dim 1: T→4, E→0; Dim 2: C→4, D→0; Dim 3: F→4, N→0
    const pole1 = ['P','T','C','F'];
    for (let i = 0; i < 4; i++) {
      scores[i] = typeCode[i] === pole1[i] ? 4 : 0;
    }
    cachedType = typeCode;
    document.getElementById('landing').style.display = 'none';
    showResult();
  } else {
    renderLanding();
  }
} else {
  renderLanding();
}
</script>
