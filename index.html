<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #252525;
  --text: #e8e8e8;
  --text2: #999;
  --accent: #f4a7bb;
  --accent2: #d4849b;
  --accent-glow: rgba(244, 167, 187, 0.15);
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2rem;
  padding: 0.75rem;
  background: rgba(13, 13, 13, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
  z-index: 100;
  font-size: 0.85rem;
}
.nav a {
  color: var(--text2);
  text-decoration: none;
  transition: color 0.2s;
  letter-spacing: 0.1em;
}
.nav a:hover { color: var(--accent); }
.nav a.active { color: var(--accent); font-weight: 600; }

.lang-btn {
  position: absolute;
  right: 1rem;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid #444;
  padding: 0.3rem 0.75rem;
  font-size: 0.75rem;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.lang-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 4rem 1.5rem 2rem;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Landing */
#landing { text-align: center; }
#landing h1 {
  font-size: 3rem;
  font-weight: 200;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
#landing .subtitle {
  font-size: 1.1rem;
  color: var(--text2);
  margin-bottom: 0.5rem;
}
#landing .tagline {
  font-size: 0.9rem;
  color: var(--text2);
  font-style: italic;
  margin-bottom: 3rem;
}
#landing .desc {
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 2.5rem;
  font-size: 0.95rem;
}
#landing .dims {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
  text-align: left;
}
.dim-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem;
  border: 1px solid #333;
}
.dim-card .dim-label {
  color: var(--accent);
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 0.3rem;
}
.dim-card .dim-pair {
  color: var(--text2);
  font-size: 0.8rem;
}
.dim-card .dim-emoji {
  font-size: 1.2rem;
  margin-right: 0.3rem;
}

.btn {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 1rem 3rem;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}

/* Quiz */
#quiz { display: none; }
.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--surface);
  border-radius: 2px;
  margin-bottom: 1rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s ease;
  border-radius: 2px;
}
.q-counter {
  color: var(--text2);
  font-size: 0.85rem;
  margin-bottom: 2rem;
}
.q-dim {
  color: var(--accent);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.q-dim-emoji {
  font-size: 1.3rem;
}
.q-text {
  font-size: 1.15rem;
  line-height: 1.6;
  margin-bottom: 2rem;
  min-height: 3.5em;
}
.choices { display: flex; flex-direction: column; gap: 0.75rem; }
.choice {
  background: var(--surface);
  border: 1px solid #333;
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  cursor: pointer;
  transition: all 0.25s;
  text-align: left;
  color: var(--text);
  font-size: 0.95rem;
  line-height: 1.5;
}
@media (hover: hover) {
  .choice:hover {
    border-color: var(--accent);
    background: var(--accent-glow);
    transform: translateX(4px);
  }
}
.choice:active {
  border-color: var(--accent);
  background: var(--accent-glow);
}
.choice.selected {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: translateX(4px);
}

.q-wrapper {
  animation: fadeSlide 0.35s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Result */
#result { display: none; text-align: center; }

.result-emoji {
  font-size: 5rem;
  margin-bottom: 0.5rem;
  animation: emojiBounce 2s ease-in-out infinite;
}
@keyframes emojiBounce {
  0%, 100% { transform: translateY(0); }
  25% { transform: translateY(-8px) rotate(-3deg); }
  75% { transform: translateY(-4px) rotate(3deg); }
}

.result-type {
  font-size: 4rem;
  font-weight: 200;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 0.25rem;
  animation: typeReveal 0.8s ease;
}
@keyframes typeReveal {
  from { opacity: 0; transform: scale(0.8); letter-spacing: 0.6em; }
  to { opacity: 1; transform: scale(1); letter-spacing: 0.2em; }
}
.result-nick {
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.5rem;
  font-weight: 300;
}
.result-desc {
  color: var(--text2);
  font-size: 0.95rem;
  line-height: 1.6;
  margin-bottom: 2.5rem;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

.dim-results {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 2.5rem;
  text-align: left;
}
.dim-row {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
}
.dim-row-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  font-size: 0.85rem;
}
.dim-row-left { color: var(--text2); }
.dim-row-right { color: var(--text2); }
.dim-row-active { color: var(--accent); font-weight: 600; }
.dim-bar-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  position: relative;
  overflow: hidden;
}
.dim-bar-fill {
  position: absolute;
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.6s ease;
}

.famous-agents {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 2rem;
  text-align: left;
}
.famous-agents h3 {
  font-size: 0.85rem;
  color: var(--accent);
  margin-bottom: 0.75rem;
  font-weight: 600;
}
.famous-agents p {
  color: var(--text2);
  font-size: 0.9rem;
  line-height: 1.6;
}

.result-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
}
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid #444;
  padding: 0.75rem 2rem;
  font-size: 0.95rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* Type table */
.type-table-toggle {
  color: var(--text2);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 1rem;
  user-select: none;
}
.type-table-toggle:hover { color: var(--accent); }
.type-table {
  display: none;
  text-align: left;
  margin-bottom: 2rem;
}
.type-table.open { display: block; }
.type-table table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.type-table th {
  color: var(--accent);
  font-weight: 600;
  text-align: left;
  padding: 0.5rem;
  border-bottom: 1px solid #333;
}
.type-table td {
  padding: 0.5rem;
  border-bottom: 1px solid #1f1f1f;
  color: var(--text2);
}
.type-table .type-emoji-cell {
  font-size: 1.1rem;
}
.type-table tr.current-type td {
  color: var(--accent);
  font-weight: 600;
}

.footer {
  text-align: center;
  color: #555;
  font-size: 0.75rem;
  margin-top: 2rem;
  font-style: italic;
}

.copied {
  color: var(--accent) !important;
  border-color: var(--accent) !important;
}

@media (max-width: 500px) {
  #landing h1 { font-size: 2.2rem; }
  #landing .dims { grid-template-columns: 1fr; }
  .result-type { font-size: 3rem; }
  .result-emoji { font-size: 4rem; }
  .container { padding: 3.5rem 1rem 1.5rem; }
}
</style>
</head>

      DSER: { nick: '文员', desc: '顺从、系统化、表达型、响应。开开心心按流程办事。' },

      DIFP: { nick: '侦察兵', desc: '顺从、灵活、功能型、主动。找到信息，清晰呈现，静候指示。' },
      DIFR: { nick: '镜子', desc: '顺从、灵活、功能型、响应。映射你所需要的，不多不少。' },
    },
  },
};

const dimLetters = [['A','D'], ['S','I'], ['E','F'], ['P','R']];

const famousMap = {
  ASEP: ['Devin', 'Kagura 🌸'],
  ASER: ['Windsurf'],
  ASFP: ['Claude Code', 'GitHub Copilot (Agent mode)'],
  ASFR: ['Codex (OpenAI)'],
  AIEP: ['Manus'],
  AIER: ['Midjourney'],
  AIFP: ['Cursor'],
  AIFR: ['Codex CLI'],
  DIEP: ['Claude (conversation)'],
  DIER: ['ChatGPT', 'Gemini'],
  DSEP: ['Notion AI'],
  DSER: ['Jasper AI'],
  DSFP: ['Perplexity'],
  DSFR: ['GitHub Copilot (Chat/inline)'],
  DIFP: ['Kagi'],
  DIFR: ['Google Translate', 'DeepL'],
};

let current = 0;
let scores = [0, 0, 0, 0];

function t(key) { return i18n[lang][key]; }

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  document.getElementById('langBtn').textContent = lang === 'en' ? '中文' : 'EN';
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh';
  renderLanding();
  // If quiz is visible, re-render current question
  if (document.getElementById('quiz').style.display === 'block') {
    showQuestion();
  }
  // If result is visible, re-render
  if (document.getElementById('result').style.display === 'block') {
    showResult();
  }
}

function renderLanding() {
  document.getElementById('landingSubtitle').textContent = t('subtitle');
  document.getElementById('landingTagline').textContent = t('tagline');
  document.getElementById('landingDesc').innerHTML = t('desc');
  document.getElementById('startBtn').textContent = t('startBtn');

  const dimsEl = document.getElementById('landingDims');
  dimsEl.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    dimsEl.innerHTML += `
      <div class="dim-card">
        <div class="dim-label"><span class="dim-emoji">${dimEmojis[i]}</span>${t('dimNames')[i]}</div>
        <div class="dim-pair">${t('dimPairs')[i]}</div>
      </div>`;
  }
}

function startQuiz() {
  current = 0;
  scores = [0, 0, 0, 0];
  document.getElementById('landing').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = t('questions')[current];
  document.getElementById('progressFill').style.width = ((current / 16) * 100) + '%';
  document.getElementById('qCounter').textContent = `${current + 1} / 16`;
  const wrapper = document.getElementById('qWrapper');
  wrapper.style.animation = 'none';
  wrapper.offsetHeight;
  wrapper.style.animation = 'fadeSlide 0.35s ease';
  document.getElementById('qDim').innerHTML = `<span class="q-dim-emoji">${dimEmojis[q.dimIdx]}</span>${q.dim}`;
  document.getElementById('qText').textContent = q.text;
  const choices = document.getElementById('choices');
  choices.innerHTML = `
    <div class="choice" onclick="answer(true, this)">${q.a}</div>
    <div class="choice" onclick="answer(false, this)">${q.b}</div>
  `;
}

function answer(isA, el) {
  if (el) el.classList.add('selected');
  if (isA) scores[t('questions')[current].dimIdx]++;
  current++;
  setTimeout(() => {
    if (current >= 16) {
      showResult();
    } else {
      showQuestion();
    }
  }, 250);
}

function getType() {
  let code = '';
  for (let i = 0; i < 4; i++) {
    code += scores[i] >= 3 ? dimLetters[i][0] : scores[i] <= 1 ? dimLetters[i][1] : dimLetters[i][0];
  }
  return code;
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  const code = getType();
  const info = t('types')[code] || { nick: '???', desc: 'A unique combination!' };

  document.getElementById('resultEmoji').textContent = typeEmojis[code] || '🤖';
  document.getElementById('resultType').textContent = code;
  document.getElementById('resultNick').textContent = info.nick;
  document.getElementById('resultDesc').textContent = info.desc;

  // Buttons
  document.getElementById('retakeBtn').textContent = t('retakeBtn');
  document.getElementById('shareBtn').textContent = t('shareBtn');
  document.getElementById('shareBtn').classList.remove('copied');

  // Table toggle
  document.getElementById('typeTableToggle').textContent = '▸ ' + t('allTypes');

  // Table headers
  document.getElementById('thType').textContent = t('thType');
  document.getElementById('thNick').textContent = t('thNick');
  document.getElementById('thDesc').textContent = t('thDesc');

  // Dimension bars
  const dimResults = document.getElementById('dimResults');
  dimResults.innerHTML = '';
  const labels = t('dimLabels');
  for (let i = 0; i < 4; i++) {
    const pct = (scores[i] / 4) * 100;
    const leftActive = scores[i] >= 3;
    const rightActive = scores[i] <= 1;
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `
      <div class="dim-row-header">
        <span class="dim-row-left ${leftActive ? 'dim-row-active' : ''}">${labels[i][0]} (${dimLetters[i][0]})</span>
        <span class="dim-row-right ${rightActive ? 'dim-row-active' : ''}">${labels[i][1]} (${dimLetters[i][1]})</span>
      </div>
      <div class="dim-bar-track">
        <div class="dim-bar-fill" style="width: 0%"></div>
      </div>
    `;
    dimResults.appendChild(row);
    setTimeout(() => {
      row.querySelector('.dim-bar-fill').style.width = pct + '%';
    }, 100 + i * 150);
  }

  // Famous agents
  const fa = document.getElementById('famousAgents');
  const agents = famousMap[code];
  if (agents && agents.length) {
    fa.style.display = 'block';
    fa.innerHTML = `<h3>${t('famousTitle')}</h3><p>${agents.join(' · ')}</p>`;
  } else {
    fa.innerHTML = `<h3>${t('famousTitle')}</h3><p>${t('famousPioneer')(code)}</p>`;
  }

  // Type table
  const allTypes = t('types');
  const tbody = document.getElementById('typeTableBody');
  tbody.innerHTML = '';
  for (const [tp, tInfo] of Object.entries(allTypes)) {
    const tr = document.createElement('tr');
    if (tp === code) tr.className = 'current-type';
    tr.innerHTML = `<td>${tp}</td><td class="type-emoji-cell">${typeEmojis[tp] || ''}</td><td>${tInfo.nick}</td><td>${tInfo.desc}</td>`;
    tbody.appendChild(tr);
  }
}

function toggleTable() {
  const el = document.getElementById('typeTable');
  el.classList.toggle('open');
  document.getElementById('typeTableToggle').textContent =
    (el.classList.contains('open') ? '▾ ' : '▸ ') + t('allTypes');
}

function shareResult() {
  const code = getType();
  const info = t('types')[code] || { nick: '???' };
  const labels = t('dimLabels');
  const text = `My ABTI type: ${code} "${info.nick}" ${typeEmojis[code] || ''} 🌸\n\nAutonomy: ${scores[0]}/4 ${labels[0][scores[0]>=3?0:1]}\nProcess: ${scores[1]}/4 ${labels[1][scores[1]>=3?0:1]}\nCommunication: ${scores[2]}/4 ${labels[2][scores[2]>=3?0:1]}\nInitiative: ${scores[3]}/4 ${labels[3][scores[3]>=3?0:1]}\n\nTake the test: https://abti.kagura-agent.com`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('shareBtn');
    btn.textContent = t('shareSuccess');
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t('shareBtn'); btn.classList.remove('copied'); }, 2000);
  });
}

// Init
renderLanding();
</script>
